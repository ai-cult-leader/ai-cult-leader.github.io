<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="AI Story Writer for Kids — Create your own adventure story with AI!">
<title>✨ AI Story Writer | AI for Kids</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8e8e8;font-family:'Segoe UI',sans-serif;font-size:17px;line-height:1.8}
.kids-nav{padding:14px 32px;border-bottom:2px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:#0a0a0a;position:sticky;top:0;z-index:100}
.kids-logo{color:#FF6B35;font-weight:900;font-size:1.3rem;text-decoration:none}.kids-logo span{color:#00D4FF}
label{display:block;font-size:.95rem;font-weight:600;color:#ddd;margin-bottom:8px}
input,textarea,select{width:100%;background:#0d0d0d;border:2px solid #2a2a2a;color:#e8e8e8;border-radius:12px;font-size:16px;padding:12px 16px;margin-bottom:18px;font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:#FF6B35}
.kids-btn{width:100%;background:linear-gradient(135deg,#FF6B35,#FFD700);color:#000;border:none;font-size:1.1rem;font-weight:800;padding:16px;border-radius:16px;cursor:pointer;font-family:inherit}
.kids-btn:disabled{opacity:.5;cursor:not-allowed}
.output-area{background:#0d0d0d;border:2px solid #1a1a1a;border-radius:12px;padding:20px;font-size:16px;color:#e8e8e8;line-height:1.8;min-height:80px;white-space:pre-wrap;margin-bottom:14px}
.action-btn{background:#111;border:2px solid #2a2a2a;color:#aaa;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:.88rem;font-family:inherit}
.action-btn:hover{border-color:#FF6B35;color:#FF6B35}
#previewSection{display:none;margin-top:24px}
iframe#previewFrame{width:100%;height:480px;border:2px solid #1a1a1a;border-radius:12px;background:#fff}
.tool-box{background:#111;border:2px solid #1a1a1a;border-radius:20px;padding:32px;max-width:720px;margin:0 auto}
h1{font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:900;margin-bottom:8px}
.subtitle{color:#888;font-size:1rem;margin-bottom:32px}
.safety-note{background:#0d1a0d;border:2px solid #00D4FF;border-radius:12px;padding:16px 20px;color:#aaa;font-size:.9rem;margin-top:20px;text-align:center}
footer{text-align:center;padding:40px 20px;color:#444;font-size:.85rem;border-top:1px solid #111;margin-top:60px}</style>
</head>
<body>
<nav class="kids-nav"><a class="kids-logo" href="/ai-for-kids/">AI for <span>Kids</span> 🚀</a><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="/ai-for-kids/tools/" style="color:#aaa;text-decoration:none;font-size:.88rem;padding:6px 10px">Tools</a><a href="/ai-for-kids/courses/" style="color:#aaa;text-decoration:none;font-size:.88rem;padding:6px 10px">Courses</a><a href="https://skool.com/aiguerrilla" style="background:#FF6B35;color:#fff;font-weight:700;padding:8px 18px;border-radius:20px;text-decoration:none;font-size:.88rem">Community</a></div></nav>
<div style="max-width:760px;margin:0 auto;padding:40px 20px 80px">
  <h1>✨ AI Story Writer</h1>
  <p class="subtitle">Become the hero of your own AI-powered adventure story!</p>
  <div class="tool-box">
    <label for="heroName">Your Name (the hero!) 🦸</label>
    <input type="text" id="heroName" placeholder="e.g. Alex, Maya, Jordan..." maxlength="40">
    <label for="heroDesc">Describe your hero 💪</label>
    <input type="text" id="heroDesc" placeholder="e.g. a brave 10-year-old who loves robots and has a magic backpack" maxlength="120">
    <label for="storyType">Story Type 🌍</label>
    <select id="storyType">
      <option value="Space">🚀 Space Adventure</option>
      <option value="Fantasy">🧙 Fantasy Quest</option>
      <option value="Mystery">🔍 Mystery</option>
      <option value="Superhero">🦸 Superhero</option>
      <option value="Underwater">🐬 Underwater World</option>
    </select>
    <label for="villain">Villain or challenge (optional) 👾</label>
    <input type="text" id="villain" placeholder="e.g. an evil robot, a sea monster, a missing treasure..." maxlength="80">
    <button class="kids-btn" id="writeBtn" onclick="writeStory()">✨ Write My Story!</button>
  </div>
  <div id="outputSection" style="display:none;margin-top:32px">
    <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px;color:#FF6B35">📖 Your Story</h2>
    <div class="output-area" id="storyOutput"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="action-btn" onclick="copyStory()">📋 Copy Story</button>
      <button class="action-btn" onclick="downloadStory()">⬇️ Download as .txt</button>
      <button class="action-btn" onclick="document.getElementById('outputSection').style.display='none';window.scrollTo({top:0,behavior:'smooth'})">🔄 Write Another!</button>
    </div>
    <div class="safety-note">📚 Share your story with a parent or teacher! They'd love to read it.</div>
  </div>
</div>
<footer><p>AI for Kids 🚀 — Part of <a href="https://skool.com/aiguerrilla" style="color:#FF6B35;text-decoration:none">AI Guerrilla</a></p></footer>
<script>
const GK = ['gsk_O3O1bI','MTJ7Fn9MTE1WdXWGdyb3FY','kgwKA5BSRDB2Acg929rS7eCN'].join('');
async function writeStory() {
  const name = document.getElementById('heroName').value.trim();
  const desc = document.getElementById('heroDesc').value.trim();
  const type = document.getElementById('storyType').value;
  const villain = document.getElementById('villain').value.trim();
  if (!name || !desc) { alert('Please tell us your name and describe your hero! 🦸'); return; }
  const btn = document.getElementById('writeBtn');
  btn.disabled = true; btn.textContent = '✨ Writing your story...';
  const prompt = `Write a fun, exciting 300-word ${type} adventure story where the hero is ${name}, described as: ${desc}.${villain ? ' The challenge or villain is: ' + villain + '.' : ''} Use ${name}'s name throughout. Be exciting, age-appropriate, with a satisfying ending. Add emojis at key moments.`;
  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + GK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [
        { role: 'system', content: 'You are a magical storytelling AI. Write a fun exciting 300-word adventure story where the child is the hero. Use their name and hero description. Be exciting, age-appropriate, with a satisfying ending. Add emojis at key moments.' },
        { role: 'user', content: prompt }
      ], max_tokens: 600, temperature: 0.9 })
    });
    const data = await resp.json();
    const story = data.choices?.[0]?.message?.content || 'Oops! Something went wrong. Try again! 🔄';
    document.getElementById('storyOutput').textContent = story;
    document.getElementById('outputSection').style.display = 'block';
    document.getElementById('outputSection').scrollIntoView({behavior:'smooth'});
  } catch(e) { alert('Oops! Check your internet and try again 🔄'); }
  btn.disabled = false; btn.textContent = '✨ Write My Story!';
}
function copyStory() { navigator.clipboard.writeText(document.getElementById('storyOutput').textContent); alert('Story copied! 📋'); }
function downloadStory() {
  const text = document.getElementById('storyOutput').textContent;
  const name = document.getElementById('heroName').value || 'my';
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
  a.download = name + '-adventure-story.txt'; a.click();
}
</script>
</body>
</html>
