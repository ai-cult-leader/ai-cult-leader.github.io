<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Build Your First Website with AI — AI for Kids by AI Guerrilla">
<title>🌐 My First Website | AI for Kids</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8e8e8;font-family:'Segoe UI',sans-serif;font-size:17px;line-height:1.8}
.kids-nav{padding:14px 32px;border-bottom:2px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:#0a0a0a;position:sticky;top:0;z-index:100}
.kids-logo{color:#FF6B35;font-weight:900;font-size:1.3rem;text-decoration:none}.kids-logo span{color:#00D4FF}
label{display:block;font-size:.95rem;font-weight:600;color:#ddd;margin-bottom:8px}
input,textarea,select{width:100%;background:#0d0d0d;border:2px solid #2a2a2a;color:#e8e8e8;border-radius:12px;font-size:16px;padding:12px 16px;margin-bottom:18px;font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:#FF6B35}
.kids-btn{width:100%;background:linear-gradient(135deg,#FF6B35,#FFD700);color:#000;border:none;font-size:1.1rem;font-weight:800;padding:16px;border-radius:16px;cursor:pointer;font-family:inherit}
.kids-btn:disabled{opacity:.5;cursor:not-allowed}
.output-area{background:#0d0d0d;border:2px solid #1a1a1a;border-radius:12px;padding:20px;font-size:16px;color:#e8e8e8;line-height:1.8;min-height:80px;white-space:pre-wrap;margin-bottom:14px}
.action-btn{background:#111;border:2px solid #2a2a2a;color:#aaa;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:.88rem;font-family:inherit}
.action-btn:hover{border-color:#FF6B35;color:#FF6B35}
#previewSection{display:none;margin-top:24px}
iframe#previewFrame{width:100%;height:480px;border:2px solid #1a1a1a;border-radius:12px;background:#fff}
.tool-box{background:#111;border:2px solid #1a1a1a;border-radius:20px;padding:32px;max-width:720px;margin:0 auto}
h1{font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:900;margin-bottom:8px}
.subtitle{color:#888;font-size:1rem;margin-bottom:32px}
.safety-note{background:#0d1a0d;border:2px solid #00D4FF;border-radius:12px;padding:16px 20px;color:#aaa;font-size:.9rem;margin-top:20px;text-align:center}
footer{text-align:center;padding:40px 20px;color:#444;font-size:.85rem;border-top:1px solid #111;margin-top:60px}
#codeEditor{font-family:monospace;font-size:13px;height:200px;resize:vertical}</style>
</head>
<body>
<nav class="kids-nav"><a class="kids-logo" href="/ai-for-kids/">AI for <span>Kids</span> 🚀</a><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="/ai-for-kids/tools/" style="color:#aaa;text-decoration:none;font-size:.88rem;padding:6px 10px">Tools</a><a href="/ai-for-kids/courses/" style="color:#aaa;text-decoration:none;font-size:.88rem;padding:6px 10px">Courses</a><a href="https://skool.com/aiguerrilla" style="background:#FF6B35;color:#fff;font-weight:700;padding:8px 18px;border-radius:20px;text-decoration:none;font-size:.88rem">Community</a></div></nav>
<div style="max-width:760px;margin:0 auto;padding:40px 20px 80px">
  <h1>🌐 My First Website</h1>
  <p class="subtitle">Describe your dream website and watch AI build it for you!</p>
  <div class="tool-box">
    <label for="siteAbout">What is your website about? 🌟</label>
    <input type="text" id="siteAbout" placeholder="e.g. my favorite dinosaurs, a fan page for cats, my gaming channel..." maxlength="120">
    <label for="siteOwner">Your Name (website owner) 👤</label>
    <input type="text" id="siteOwner" placeholder="e.g. Alex, Maya, Jordan..." maxlength="40">
    <label for="colorTheme">Color Theme 🎨</label>
    <select id="colorTheme">
      <option value="bright and colorful with rainbow accents">🌈 Rainbow &amp; Colorful</option>
      <option value="cool blue and purple space theme">🚀 Space Blue &amp; Purple</option>
      <option value="green nature and forest theme">🌿 Nature Green</option>
      <option value="hot pink and gold glamour theme">✨ Pink &amp; Gold Glam</option>
      <option value="orange and red fire and energy theme">🔥 Fire &amp; Energy</option>
    </select>
    <label for="siteInclude">What should your website include? (ideas!) 💡</label>
    <input type="text" id="siteInclude" placeholder="e.g. a fun intro, top 5 facts, a photo gallery section, contact section..." maxlength="150">
    <button class="kids-btn" id="buildBtn" onclick="buildWebsite()">🌐 Build My Website!</button>
  </div>
  <div id="previewSection">
    <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px;color:#FF6B35">🎉 Your Website is Ready!</h2>
    <iframe id="previewFrame"></iframe>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
      <button class="action-btn" onclick="openFullscreen()">🔗 Open Full Screen</button>
      <button class="action-btn" onclick="downloadSite()">⬇️ Download HTML</button>
      <button class="action-btn" onclick="copyCode()">📋 Copy Code</button>
    </div>
    <div style="margin-top:24px">
      <label>📄 Your Website's Code (you can edit it!)</label>
      <textarea class="output-area" id="codeEditor"></textarea>
    </div>
    <div class="safety-note">💡 Ask a parent or teacher to help you put your website on the internet!</div>
  </div>
</div>
<footer><p>AI for Kids 🚀 — Part of <a href="https://skool.com/aiguerrilla" style="color:#FF6B35;text-decoration:none">AI Guerrilla</a></p></footer>
<script>
const GK = ['gsk_O3O1bI','MTJ7Fn9MTE1WdXWGdyb3FY','kgwKA5BSRDB2Acg929rS7eCN'].join('');
let genHTML = '';
async function buildWebsite() {
  const about = document.getElementById('siteAbout').value.trim();
  const owner = document.getElementById('siteOwner').value.trim();
  const theme = document.getElementById('colorTheme').value;
  const include = document.getElementById('siteInclude').value.trim();
  if (!about || !owner) { alert('Tell us about your website and your name first! 🌐'); return; }
  const btn = document.getElementById('buildBtn');
  btn.disabled = true; btn.textContent = '🔧 Building your website...';
  const prompt = `Generate a fun complete single-file HTML website for a kid.\nTopic: ${about}\nOwner: ${owner}\nColor theme: ${theme}\nSections: ${include||'intro section, fun facts, favorites section'}\nRequirements: all CSS inline, colorful design, 3+ distinct sections, fun animations/hover effects, look like a real website. Return ONLY the HTML.`;
  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST', headers:{'Authorization':'Bearer '+GK,'Content-Type':'application/json'},
      body: JSON.stringify({model:'llama-3.3-70b-versatile',messages:[
        {role:'system',content:'Generate a fun, colorful, complete single-file HTML website for a kid. Match their theme. Include all CSS inline. Make it look amazing and age-appropriate. Return ONLY the HTML.'},
        {role:'user',content:prompt}
      ],max_tokens:3000,temperature:0.8})
    });
    const data = await resp.json();
    genHTML = (data.choices?.[0]?.message?.content || '').replace(/^```html\n?/,'').replace(/^```\n?/,'').replace(/\n?```$/,'');
    if (!genHTML) { alert('Oops! Try again 🔄'); btn.disabled=false; btn.textContent='🌐 Build My Website!'; return; }
    document.getElementById('codeEditor').value = genHTML;
    document.getElementById('previewFrame').srcdoc = genHTML;
    document.getElementById('previewSection').style.display = 'block';
    document.getElementById('previewSection').scrollIntoView({behavior:'smooth'});
  } catch(e) { alert('Oops! Check your internet and try again 🔄'); }
  btn.disabled = false; btn.textContent = '🌐 Build My Website!';
}
function openFullscreen() { const w=window.open(''); w.document.write(genHTML||document.getElementById('codeEditor').value); w.document.close(); }
function downloadSite() {
  const about = document.getElementById('siteAbout').value||'my-website';
  const a=document.createElement('a'); a.href='data:text/html;charset=utf-8,'+encodeURIComponent(document.getElementById('codeEditor').value);
  a.download=about.toLowerCase().replace(/\s+/g,'-').substring(0,30)+'.html'; a.click();
}
function copyCode() { navigator.clipboard.writeText(document.getElementById('codeEditor').value); alert('Code copied! 📋'); }
document.getElementById('codeEditor')?.addEventListener('input',function(){ genHTML=this.value; document.getElementById('previewFrame').srcdoc=genHTML; });
</script>
</body>
</html>
