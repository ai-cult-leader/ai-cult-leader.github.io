<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Generator — AI Guerrilla Build Tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
nav { background: #050d1a; border-bottom: 1px solid #0d2137; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.page-hdr { text-align: center; padding: 32px 20px 16px; }
.page-hdr h1 { font-size: 1.9rem; font-weight: 900; }
.page-hdr p { color: #64748b; margin-top: 8px; }
.container { max-width: 1120px; margin: 0 auto; padding: 16px 20px 60px; display: grid; grid-template-columns: 390px 1fr; gap: 24px; }
@media(max-width:820px){.container{grid-template-columns:1fr;}}
.panel { background: #0d1829; border: 1px solid #1e2d40; border-radius: 16px; padding: 24px; }
.panel h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
label { display: block; font-size: .82rem; color: #94a3b8; margin: 12px 0 4px; font-weight: 500; }
input[type=text], input[type=url], textarea, select { width: 100%; background: #080f1a; border: 1px solid #1e2d40; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: .88rem; outline: none; font-family: inherit; }
input[type=text]:focus, textarea:focus, select:focus { border-color: #00FF88; }
input[type=color] { width: 48px; height: 36px; border: 1px solid #1e2d40; border-radius: 6px; padding: 2px; background: #080f1a; cursor: pointer; }
input[type=file] { color: #94a3b8; font-size: .82rem; padding: 4px 0; }
input[type=checkbox] { width: 16px; height: 16px; accent-color: #00FF88; cursor: pointer; }
.check-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.check-row label { margin: 0; color: #e2e8f0; cursor: pointer; }
.btn-generate { width: 100%; background: linear-gradient(135deg, #00FF88, #00c896); color: #000; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 16px; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
.adv-toggle { background: none; border: 1px solid #1e2d40; border-radius: 8px; color: #64748b; padding: 8px 14px; cursor: pointer; font-size: .82rem; width: 100%; margin-top: 12px; text-align: left; }
.adv-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2d40; }
.status-msg { font-size: .85rem; color: #00FF88; margin-top: 10px; min-height: 20px; }
.btn-dl { background: #1e2d40; color: #e2e8f0; border: 1px solid #2d4a6a; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; }
.btn-dl:hover { background: #2d4a6a; }
#previewCard { display: none; margin-top: 16px; }
.right-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.right-hdr h3 { font-size: 1rem; font-weight: 700; }
.row-2 { display: flex; gap: 16px; }
.row-2 > div { flex: 1; }
</style>
</head>
<body>
<nav>
  <a href="/" style="color:#00FF88;font-weight:800;font-size:1rem;text-decoration:none;">AI Guerrilla</a>
  <div style="display:flex;gap:16px;align-items:center;">
    <a href="/academy/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Academy</a>
    <a href="/tools/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Tools</a>
    <a href="https://skool.com/aiguerrilla" target="_blank" style="background:#00FF88;color:#000;padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:700;text-decoration:none;">Community →</a>
  </div>
</nav>
<div class="page-hdr">
  <h1>🌐 Website Generator</h1>
  <p>Generate a complete, professional website with AI — ready to download and deploy</p>
</div>
<div class="container">
  <div class="panel">
    <h2>Website Details</h2>
    <label>Business Name</label>
    <input type="text" id="bizName" placeholder="e.g. Pixel & Co.">
    <label>Description</label>
    <textarea id="bizDesc" rows="3" placeholder="What does this business do? Who does it serve?"></textarea>
    <label>Business Type</label>
    <select id="bizType">
      <option>restaurant</option>
      <option>tech startup</option>
      <option>services agency</option>
      <option>portfolio / freelancer</option>
      <option>online store</option>
      <option>healthcare / wellness</option>
      <option>education</option>
    </select>
    <label>Visual Style</label>
    <select id="bizStyle">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="minimal">Minimal</option>
    </select>
    <div class="row-2">
      <div><label>Brand Color</label><br><input type="color" id="primaryColor" value="#00FF88"></div>
      <div><label>Text Color</label><br><input type="color" id="textColor" value="#ffffff"></div>
    </div>
    <button class="adv-toggle" onclick="toggleAdv('advWeb')">⚙ Advanced Options ▾</button>
    <div class="adv-section" id="advWeb">
      <label>Font Family</label>
      <select id="fontFamily">
        <option>Segoe UI</option><option>Georgia</option><option>Impact</option><option>system-ui</option><option>Arial</option>
      </select>
      <label>Logo Image (optional)</label>
      <input type="file" id="logoFile" accept="image/*">
      <label>Hero Background Image (optional)</label>
      <input type="file" id="heroFile" accept="image/*">
      <label>Instagram URL</label>
      <input type="url" id="igUrl" placeholder="https://instagram.com/...">
      <label>Twitter/X URL</label>
      <input type="url" id="twUrl" placeholder="https://x.com/...">
      <label>YouTube URL</label>
      <input type="url" id="ytUrl" placeholder="https://youtube.com/...">
      <div style="margin-top:14px;font-size:.82rem;font-weight:700;color:#e2e8f0;">Sections to Include</div>
      <div class="check-row"><input type="checkbox" id="secFeatures" checked><label for="secFeatures">Features / Why Choose Us</label></div>
      <div class="check-row"><input type="checkbox" id="secStats" checked><label for="secStats">Stats Bar</label></div>
      <div class="check-row"><input type="checkbox" id="secTestimonial" checked><label for="secTestimonial">Testimonial</label></div>
      <div class="check-row"><input type="checkbox" id="secContact" checked><label for="secContact">Contact Form</label></div>
      <div class="check-row"><input type="checkbox" id="secFAQ" checked><label for="secFAQ">FAQ Section</label></div>
    </div>
    <button class="btn-generate" id="genBtn" onclick="generateWebsite()">✦ Generate Website</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
  <div class="panel">
    <div class="right-hdr">
      <h3>🖥 Live Preview</h3>
      <button class="btn-dl" id="dlBtn" style="display:none" onclick="dlWebsite()">⬇ Download HTML</button>
    </div>
    <div id="previewCard"></div>
    <iframe id="previewFrame" style="width:100%;height:520px;border:1px solid #1e2d40;border-radius:10px;background:#050d1a;" srcdoc="<div style='display:flex;align-items:center;justify-content:center;height:100%;background:#050d1a;color:#334155;font-family:system-ui;font-size:.95rem;text-align:center;padding:40px;'>Fill in details and click<br><br><b style=color:#00FF88>Generate Website</b></div>"></iframe>
  </div>
</div>

<script>
var _websiteHTML = '';

const GROQ_KEYS = [
  ["gsk_PEcgwEnKeUYj1ph","Sm0NmWGdyb3FYt4hRzh","wiPXJaSgEBNhS2w3Ds"].join(""),
  ["gsk_O3O1bIMTJ","7Fn9MTE1WdXWGdyb3FY","kgwKA5BSRDB2Acg929rS7eCN"].join(""),
  ["gsk_SpC07PQBCR4t","mMzERyCYWGdyb3FY","Obw5uGiYTCC7eBVMzGgwIplO"].join("")
];
const GEMINI_KEY = ["AIzaSyDb5SKqAIzm","BhBIe1rRpDZSy_FHO_ORq9c"].join("");

async function callAI(prompt, system, maxTokens) {
  maxTokens = maxTokens || 2000;
  var attempts = [
    {type:'groq',key:0,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:0,model:'llama-3.1-8b-instant'},
    {type:'groq',key:1,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:2,model:'llama-3.3-70b-versatile'},
    {type:'gemini',model:'gemini-2.0-flash'},
    {type:'gemini',model:'gemini-1.5-flash'}
  ];
  for (var i = 0; i < attempts.length; i++) {
    var a = attempts[i];
    try {
      var res, data, text;
      if (a.type === 'groq') {
        res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method:'POST',
          headers:{'Authorization':'Bearer '+GROQ_KEYS[a.key],'Content-Type':'application/json'},
          body:JSON.stringify({model:a.model,messages:[{role:'system',content:system},{role:'user',content:prompt}],max_tokens:maxTokens,temperature:0.3})
        });
        if (res.status===429) continue;
        data = await res.json();
        text = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      } else {
        res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+a.model+':generateContent?key='+GEMINI_KEY, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{role:'user',parts:[{text:system+'\n\n'+prompt}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.3}})
        });
        if (res.status===429) continue;
        data = await res.json();
        text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
      }
      if (text && text.length > 20) return text;
    } catch(e) { console.warn('AI failed:', a.model, e.message); }
  }
  return null;
}

function toggleAdv(id) {
  var s = document.getElementById(id);
  if (s) s.style.display = s.style.display==='block' ? 'none' : 'block';
}

function setStatus(msg, col) {
  var el = document.getElementById('statusMsg');
  if (el) { el.textContent = msg; el.style.color = col || '#00FF88'; }
}

function fileToBase64(file) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function(e){ res(e.target.result); };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function downloadText(filename, content) {
  var blob = new Blob([content], {type:'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function showCard(title, subtitle, icon, color, badges, stats) {
  var el = document.getElementById('previewCard');
  if (!el) return;
  el.style.display = 'block';
  var h = '<div style="background:linear-gradient(135deg,'+color+'22,'+color+'11);border:1px solid '+color+'44;border-radius:16px;padding:24px;">';
  h += '<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">';
  h += '<div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,'+color+','+color+'99);display:flex;align-items:center;justify-content:center;font-size:1.6rem;">'+icon+'</div>';
  h += '<div><div style="font-size:1.1rem;font-weight:800;color:#fff;">'+title+'</div>';
  h += '<div style="font-size:.85rem;color:#94a3b8;">'+subtitle+'</div></div>';
  h += '<div style="margin-left:auto;background:'+color+';color:#000;padding:4px 12px;border-radius:50px;font-size:.75rem;font-weight:800;">✓ READY</div>';
  h += '</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">';
  for (var i=0;i<badges.length;i++) h += '<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;padding:3px 10px;border-radius:50px;font-size:.75rem;">'+badges[i]+'</span>';
  h += '</div><div style="display:grid;grid-template-columns:repeat('+stats.length+',1fr);gap:12px;">';
  for (var j=0;j<stats.length;j++) h += '<div style="text-align:center;background:rgba(255,255,255,.05);border-radius:8px;padding:10px;"><div style="font-size:1.2rem;font-weight:800;color:'+color+';">'+stats[j].value+'</div><div style="font-size:.7rem;color:#64748b;">'+stats[j].label+'</div></div>';
  h += '</div></div>';
  el.innerHTML = h;
}

async function generateWebsite() {
  var name = document.getElementById('bizName').value.trim() || 'My Business';
  var desc = document.getElementById('bizDesc').value.trim() || 'A great business';
  var type = document.getElementById('bizType').value;
  var style = document.getElementById('bizStyle').value;
  var color = document.getElementById('primaryColor').value;
  var font = document.getElementById('fontFamily').value;
  var igUrl = document.getElementById('igUrl').value;
  var twUrl = document.getElementById('twUrl').value;
  var ytUrl = document.getElementById('ytUrl').value;
  var secFeatures = document.getElementById('secFeatures').checked;
  var secStats = document.getElementById('secStats').checked;
  var secTestimonial = document.getElementById('secTestimonial').checked;
  var secContact = document.getElementById('secContact').checked;
  var secFAQ = document.getElementById('secFAQ').checked;

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  setStatus('Calling AI for copy...');

  var logoBase64 = '';
  var logoFile = document.getElementById('logoFile').files[0];
  if (logoFile) { try { logoBase64 = await fileToBase64(logoFile); } catch(e){} }

  var heroBase64 = '';
  var heroFile = document.getElementById('heroFile').files[0];
  if (heroFile) { try { heroBase64 = await fileToBase64(heroFile); } catch(e){} }

  var sections = [];
  if (secFeatures) sections.push('features');
  if (secStats) sections.push('stats');
  if (secTestimonial) sections.push('testimonial');
  if (secContact) sections.push('contact form');
  if (secFAQ) sections.push('faq');

  var sys = 'You are a professional website copywriter. Return ONLY a raw JSON object with no markdown, no explanation.';
  var prompt = 'Write website copy for a '+type+' called "'+name+'". Description: '+desc+'. Style: '+style+'. Return this JSON: {"tagline":"...","headline":"...","subheadline":"...","cta":"...","features":[{"icon":"emoji","title":"...","desc":"..."},{"icon":"emoji","title":"...","desc":"..."},{"icon":"emoji","title":"...","desc":"..."}],"about":"...","stats":[{"num":"...","label":"..."},{"num":"...","label":"..."},{"num":"...","label":"..."}],"testimonial":{"quote":"...","name":"...","title":"..."},"faq":[{"q":"...","a":"..."},{"q":"...","a":"..."},{"q":"...","a":"..."},{"q":"...","a":"..."},{"q":"...","a":"..."}]}';

  var raw = await callAI(prompt, sys, 1800);
  if (!raw) { setStatus('AI call failed — check console', '#f87171'); btn.disabled = false; return; }

  var copy;
  try {
    var s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    copy = JSON.parse(raw.substring(s, e+1));
  } catch(err) { setStatus('JSON parse error: '+err.message, '#f87171'); btn.disabled = false; return; }

  setStatus('Building website HTML...');

  var bg = style==='dark' ? '#0a0a0a' : style==='light' ? '#ffffff' : '#f5f5f5';
  var fg = style==='dark' ? '#ffffff' : '#111111';
  var cardBg = style==='dark' ? '#1a1a1a' : style==='light' ? '#f0f0f0' : '#ffffff';

  var socials = '';
  if (igUrl) socials += '<a href="'+igUrl+'" target="_blank" style="color:'+color+';text-decoration:none;margin:0 10px;">Instagram</a>';
  if (twUrl) socials += '<a href="'+twUrl+'" target="_blank" style="color:'+color+';text-decoration:none;margin:0 10px;">X / Twitter</a>';
  if (ytUrl) socials += '<a href="'+ytUrl+'" target="_blank" style="color:'+color+';text-decoration:none;margin:0 10px;">YouTube</a>';

  var heroStyle = heroBase64
    ? 'background:url('+heroBase64+') center/cover no-repeat;'
    : 'background:'+bg+';';
  var logoHtml = logoBase64
    ? '<img src="'+logoBase64+'" alt="'+name+'" style="height:52px;margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;"><br>'
    : '';

  var heroTextColor = heroBase64 ? '#ffffff' : fg;
  var heroSubColor = heroBase64 ? 'rgba(255,255,255,.85)' : fg;

  var featuresHTML = '';
  if (secFeatures && copy.features) {
    featuresHTML = '<section style="padding:70px 20px;background:'+cardBg+';">';
    featuresHTML += '<div style="max-width:960px;margin:0 auto;">';
    featuresHTML += '<h2 style="text-align:center;font-size:2rem;font-weight:800;color:'+fg+';margin-bottom:40px;">Why Choose Us</h2>';
    featuresHTML += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;">';
    for (var i=0;i<copy.features.length;i++) {
      var f = copy.features[i];
      featuresHTML += '<div style="background:'+bg+';border:1px solid '+color+'33;border-radius:14px;padding:28px;text-align:center;">';
      featuresHTML += '<div style="font-size:2.8rem;margin-bottom:14px;">'+f.icon+'</div>';
      featuresHTML += '<h3 style="color:'+color+';margin-bottom:10px;">'+f.title+'</h3>';
      featuresHTML += '<p style="color:'+fg+';opacity:.8;line-height:1.6;">'+f.desc+'</p></div>';
    }
    featuresHTML += '</div></div></section>';
  }

  var statsHTML = '';
  if (secStats && copy.stats) {
    statsHTML = '<section style="padding:50px 20px;background:'+color+'11;">';
    statsHTML += '<div style="max-width:700px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;text-align:center;">';
    for (var si=0;si<copy.stats.length;si++) {
      statsHTML += '<div><div style="font-size:2.8rem;font-weight:900;color:'+color+';">'+copy.stats[si].num+'</div>';
      statsHTML += '<div style="color:'+fg+';opacity:.8;margin-top:4px;">'+copy.stats[si].label+'</div></div>';
    }
    statsHTML += '</div></section>';
  }

  var testimonialHTML = '';
  if (secTestimonial && copy.testimonial) {
    testimonialHTML = '<section style="padding:70px 20px;background:'+bg+';">';
    testimonialHTML += '<div style="max-width:720px;margin:0 auto;background:'+cardBg+';border-left:4px solid '+color+';border-radius:10px;padding:36px;">';
    testimonialHTML += '<p style="font-size:1.2rem;font-style:italic;color:'+fg+';line-height:1.7;margin-bottom:20px;">\u201c'+copy.testimonial.quote+'\u201d</p>';
    testimonialHTML += '<div style="font-weight:700;color:'+color+';">'+copy.testimonial.name+'</div>';
    testimonialHTML += '<div style="color:'+fg+';opacity:.7;font-size:.9rem;">'+copy.testimonial.title+'</div>';
    testimonialHTML += '</div></section>';
  }

  var contactHTML = '';
  if (secContact) {
    contactHTML = '<section id="contact" style="padding:70px 20px;background:'+cardBg+';">';
    contactHTML += '<div style="max-width:520px;margin:0 auto;text-align:center;">';
    contactHTML += '<h2 style="font-size:1.9rem;font-weight:800;color:'+fg+';margin-bottom:24px;">Get In Touch</h2>';
    contactHTML += '<form style="display:flex;flex-direction:column;gap:14px;" onsubmit="return false;">';
    contactHTML += '<input type="text" placeholder="Your Name" style="padding:13px;border:1px solid '+color+'44;border-radius:8px;background:'+bg+';color:'+fg+';font-size:.95rem;">';
    contactHTML += '<input type="email" placeholder="Your Email" style="padding:13px;border:1px solid '+color+'44;border-radius:8px;background:'+bg+';color:'+fg+';font-size:.95rem;">';
    contactHTML += '<textarea rows="4" placeholder="Your Message" style="padding:13px;border:1px solid '+color+'44;border-radius:8px;background:'+bg+';color:'+fg+';resize:vertical;font-size:.95rem;font-family:inherit;"></textarea>';
    contactHTML += '<button type="submit" style="background:'+color+';color:#000;border:none;padding:14px;border-radius:8px;font-weight:800;font-size:1rem;cursor:pointer;">'+copy.cta+'</button>';
    contactHTML += '</form></div></section>';
  }

  var faqHTML = '';
  if (secFAQ && copy.faq) {
    faqHTML = '<section style="padding:70px 20px;background:'+bg+';">';
    faqHTML += '<div style="max-width:720px;margin:0 auto;">';
    faqHTML += '<h2 style="text-align:center;font-size:1.9rem;font-weight:800;color:'+fg+';margin-bottom:36px;">Frequently Asked Questions</h2>';
    for (var fi=0;fi<copy.faq.length;fi++) {
      faqHTML += '<div style="border:1px solid '+color+'33;border-radius:10px;padding:18px 22px;margin-bottom:14px;">';
      faqHTML += '<div style="font-weight:700;color:'+color+';margin-bottom:8px;">'+copy.faq[fi].q+'</div>';
      faqHTML += '<div style="color:'+fg+';opacity:.85;line-height:1.6;">'+copy.faq[fi].a+'</div></div>';
    }
    faqHTML += '</div></section>';
  }

  _websiteHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>'+name+'</title>\n<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'+font+',system-ui,sans-serif;}a{text-decoration:none;}</style>\n</head>\n<body>\n'
    +'<nav style="position:sticky;top:0;z-index:100;background:'+bg+';border-bottom:1px solid '+color+'33;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;">'
    +'<div style="font-size:1.25rem;font-weight:900;color:'+color+';">'+name+'</div>'
    +'<div>'+socials+'</div></nav>\n'
    +'<section style="'+heroStyle+'min-height:92vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 20px;">'
    +'<div style="max-width:820px;">'+logoHtml
    +'<div style="font-size:.85rem;letter-spacing:3px;text-transform:uppercase;color:'+color+';margin-bottom:18px;">'+copy.tagline+'</div>'
    +'<h1 style="font-size:3.5rem;font-weight:900;color:'+heroTextColor+';line-height:1.1;margin-bottom:18px;">'+copy.headline+'</h1>'
    +'<p style="font-size:1.2rem;color:'+heroSubColor+';margin-bottom:36px;line-height:1.6;">'+copy.subheadline+'</p>'
    +'<a href="#contact" style="display:inline-block;background:'+color+';color:#000;padding:16px 36px;border-radius:8px;font-weight:800;font-size:1.1rem;">'+copy.cta+'</a>'
    +'</div></section>\n'
    +featuresHTML+statsHTML
    +'<section style="padding:70px 20px;background:'+bg+';">'
    +'<div style="max-width:720px;margin:0 auto;text-align:center;">'
    +'<h2 style="font-size:1.9rem;font-weight:800;color:'+fg+';margin-bottom:18px;">About Us</h2>'
    +'<p style="font-size:1.1rem;color:'+fg+';opacity:.85;line-height:1.7;">'+copy.about+'</p></div></section>\n'
    +testimonialHTML+contactHTML+faqHTML
    +'<footer style="background:#050505;color:#555;text-align:center;padding:28px;font-size:.85rem;">© 2025 '+name+'. All rights reserved.</footer>\n'
    +'</body>\n</html>';

  var blob = new Blob([_websiteHTML], {type:'text/html'});
  document.getElementById('previewFrame').src = URL.createObjectURL(blob);
  document.getElementById('dlBtn').style.display = 'inline-block';
  setStatus('Website generated!');
  btn.disabled = false;

  showCard(name, type+' · '+style+' style', '🌐', color,
    ['HTML5','Responsive',font,'SEO-ready'],
    [{value:'1',label:'HTML File'},{value:''+(copy.features?copy.features.length:0),label:'Features'},{value:''+(copy.faq?copy.faq.length:0),label:'FAQs'}]);
}

function dlWebsite() {
  if (_websiteHTML) downloadText('index.html', _websiteHTML);
}

function downloadText(filename, content) {
  var blob = new Blob([content], {type:'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
