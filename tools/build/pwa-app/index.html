<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWA App Creator — AI Guerrilla Build Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
nav { background: #050d1a; border-bottom: 1px solid #0d2137; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.page-hdr { text-align: center; padding: 32px 20px 16px; }
.page-hdr h1 { font-size: 1.9rem; font-weight: 900; }
.page-hdr p { color: #64748b; margin-top: 8px; }
.container { max-width: 1120px; margin: 0 auto; padding: 16px 20px 60px; display: grid; grid-template-columns: 390px 1fr; gap: 24px; }
@media(max-width:820px){.container{grid-template-columns:1fr;}}
.panel { background: #0d1829; border: 1px solid #1e2d40; border-radius: 16px; padding: 24px; }
.panel h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
label { display: block; font-size: .82rem; color: #94a3b8; margin: 12px 0 4px; font-weight: 500; }
input[type=text], textarea, select { width: 100%; background: #080f1a; border: 1px solid #1e2d40; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: .88rem; outline: none; font-family: inherit; }
input[type=text]:focus, textarea:focus { border-color: #ec4899; }
input[type=color] { width: 48px; height: 36px; border: 1px solid #1e2d40; border-radius: 6px; padding: 2px; background: #080f1a; cursor: pointer; }
input[type=file] { color: #94a3b8; font-size: .82rem; }
input[type=checkbox] { width: 16px; height: 16px; accent-color: #ec4899; cursor: pointer; }
.check-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.check-row label { margin: 0; color: #e2e8f0; cursor: pointer; }
.btn-generate { width: 100%; background: linear-gradient(135deg, #ec4899, #db2777); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 16px; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
.adv-toggle { background: none; border: 1px solid #1e2d40; border-radius: 8px; color: #64748b; padding: 8px 14px; cursor: pointer; font-size: .82rem; width: 100%; margin-top: 12px; text-align: left; }
.adv-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2d40; }
.status-msg { font-size: .85rem; color: #ec4899; margin-top: 10px; min-height: 20px; }
.btn-dl { background: #1e2d40; color: #e2e8f0; border: 1px solid #2d4a6a; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; margin-right: 8px; }
.btn-copy { background: #0d2137; color: #ec4899; border: 1px solid #ec489944; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; }
#previewCard { display: none; margin-top: 16px; }
.right-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.right-hdr h3 { font-size: 1rem; font-weight: 700; }
.tab-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.tab-btn { background: #080f1a; border: 1px solid #1e2d40; border-radius: 6px; color: #64748b; padding: 6px 14px; cursor: pointer; font-size: .8rem; }
.tab-btn.active { background: #ec4899; color: #fff; border-color: #ec4899; font-weight: 700; }
textarea.code-out { font-family: 'Consolas','Monaco',monospace; font-size: .82rem; background: #050d1a; border: 1px solid #1e2d40; border-radius: 8px; width: 100%; min-height: 440px; padding: 16px; color: #e2e8f0; resize: vertical; }
.nav-item-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.nav-item-row input { flex: 1; }
.btn-add-nav { background: #0d2137; color: #ec4899; border: 1px solid #ec489933; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: .8rem; white-space: nowrap; }
.btn-remove-nav { background: none; border: 1px solid #334155; border-radius: 6px; color: #64748b; padding: 4px 8px; cursor: pointer; font-size: .78rem; }
</style>
</head>
<body>
<nav>
  <a href="/" style="color:#00FF88;font-weight:800;font-size:1rem;text-decoration:none;">AI Guerrilla</a>
  <div style="display:flex;gap:16px;align-items:center;">
    <a href="/academy/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Academy</a>
    <a href="/tools/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Tools</a>
    <a href="https://skool.com/aiguerrilla" target="_blank" style="background:#00FF88;color:#000;padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:700;text-decoration:none;">Community →</a>
  </div>
</nav>
<div class="page-hdr">
  <h1>📱 PWA App Creator</h1>
  <p>Generate a complete Progressive Web App — installable on any device</p>
</div>
<div class="container">
  <div class="panel">
    <h2>App Details</h2>
    <label>App Name</label>
    <input type="text" id="appName" placeholder="e.g. FocusFlow">
    <label>App Description</label>
    <textarea id="appDesc" rows="3" placeholder="What does your app do?"></textarea>
    <label>App Category</label>
    <select id="appType">
      <option>productivity</option>
      <option>lifestyle</option>
      <option>business</option>
      <option>health & fitness</option>
      <option>finance</option>
      <option>education</option>
      <option>entertainment</option>
    </select>
    <div style="display:flex;gap:16px;margin-top:4px;">
      <div><label>Theme Color</label><br><input type="color" id="themeColor" value="#ec4899"></div>
      <div><label>Background</label><br><input type="color" id="bgColor" value="#080f1a"></div>
    </div>
    <button class="adv-toggle" onclick="toggleAdv('advPWA')">⚙ Advanced Options ▾</button>
    <div class="adv-section" id="advPWA">
      <label>App Icon (optional)</label>
      <input type="file" id="appIcon" accept="image/*">
      <label>Navigation Items</label>
      <div id="navItems">
        <div class="nav-item-row">
          <input type="text" placeholder="🏠 Home" class="nav-input" value="🏠 Home">
          <button class="btn-remove-nav" onclick="removeNav(this)">✕</button>
        </div>
        <div class="nav-item-row">
          <input type="text" placeholder="📊 Dashboard" class="nav-input" value="📊 Dashboard">
          <button class="btn-remove-nav" onclick="removeNav(this)">✕</button>
        </div>
        <div class="nav-item-row">
          <input type="text" placeholder="⚙ Settings" class="nav-input" value="⚙ Settings">
          <button class="btn-remove-nav" onclick="removeNav(this)">✕</button>
        </div>
      </div>
      <button class="btn-add-nav" onclick="addNav()">+ Add Nav Item</button>
      <div class="check-row" style="margin-top:12px;">
        <input type="checkbox" id="offlineMode" checked>
        <label for="offlineMode">Offline mode (service worker caching)</label>
      </div>
    </div>
    <button class="btn-generate" id="genBtn" onclick="generatePWA()">✦ Generate PWA App</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
  <div class="panel">
    <div class="right-hdr">
      <h3>📂 App Files</h3>
      <div>
        <button class="btn-copy" onclick="copyActive()">⎘ Copy</button>
        <button class="btn-dl" id="dlBtn" style="display:none" onclick="dlZip()">⬇ Download ZIP</button>
      </div>
    </div>
    <div id="previewCard"></div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="showTab('html')" id="tab_html">index.html</button>
      <button class="tab-btn" onclick="showTab('manifest')" id="tab_manifest">manifest.json</button>
      <button class="tab-btn" onclick="showTab('sw')" id="tab_sw">sw.js</button>
    </div>
    <textarea class="code-out" id="code_html" placeholder="Generated PWA code will appear here..."></textarea>
    <textarea class="code-out" id="code_manifest" style="display:none" placeholder=""></textarea>
    <textarea class="code-out" id="code_sw" style="display:none" placeholder=""></textarea>
  </div>
</div>

<script>
var _activeTab = 'html';

const GROQ_KEYS = [
  ["gsk_PEcgwEnKeUYj1ph","Sm0NmWGdyb3FYt4hRzh","wiPXJaSgEBNhS2w3Ds"].join(""),
  ["gsk_O3O1bIMTJ","7Fn9MTE1WdXWGdyb3FY","kgwKA5BSRDB2Acg929rS7eCN"].join(""),
  ["gsk_SpC07PQBCR4t","mMzERyCYWGdyb3FY","Obw5uGiYTCC7eBVMzGgwIplO"].join("")
];
const GEMINI_KEY = ["AIzaSyDb5SKqAIzm","BhBIe1rRpDZSy_FHO_ORq9c"].join("");

async function callAI(prompt, system, maxTokens) {
  maxTokens = maxTokens || 3000;
  var attempts = [
    {type:'groq',key:0,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:0,model:'llama-3.1-8b-instant'},
    {type:'groq',key:1,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:2,model:'llama-3.3-70b-versatile'},
    {type:'gemini',model:'gemini-2.0-flash'},
    {type:'gemini',model:'gemini-1.5-flash'}
  ];
  for (var i=0; i<attempts.length; i++) {
    var a=attempts[i]; try {
      var res, data, text;
      if (a.type==='groq') {
        res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+GROQ_KEYS[a.key],'Content-Type':'application/json'},body:JSON.stringify({model:a.model,messages:[{role:'system',content:system},{role:'user',content:prompt}],max_tokens:maxTokens,temperature:0.3})});
        if(res.status===429)continue;data=await res.json();text=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
      } else {
        res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+a.model+':generateContent?key='+GEMINI_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:system+'\n\n'+prompt}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.3}})});
        if(res.status===429)continue;data=await res.json();text=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0].text;
      }
      if(text&&text.length>20)return text;
    } catch(e){console.warn('AI failed:',a.model,e.message);}
  }
  return null;
}

function toggleAdv(id){var s=document.getElementById(id);if(s)s.style.display=s.style.display==='block'?'none':'block';}
function setStatus(msg,col){var el=document.getElementById('statusMsg');if(el){el.textContent=msg;el.style.color=col||'#ec4899';}}

function addNav() {
  var container = document.getElementById('navItems');
  var div = document.createElement('div');
  div.className = 'nav-item-row';
  div.innerHTML = '<input type="text" class="nav-input" placeholder="📌 New Item"><button class="btn-remove-nav" onclick="removeNav(this)">✕</button>';
  container.appendChild(div);
}

function removeNav(btn) {
  var rows = document.querySelectorAll('.nav-item-row');
  if (rows.length > 1) btn.parentElement.remove();
}

function showTab(tab) {
  _activeTab = tab;
  ['html','manifest','sw'].forEach(function(t) {
    document.getElementById('code_'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab_'+t).className = 'tab-btn' + (t===tab ? ' active' : '');
  });
}

function copyActive() {
  var el = document.getElementById('code_'+_activeTab);
  if (el) navigator.clipboard.writeText(el.value).then(function(){setStatus('Copied!');setTimeout(function(){setStatus('');},2000);});
}

function showCard(title,subtitle,icon,color,badges,stats){
  var el=document.getElementById('previewCard');if(!el)return;el.style.display='block';
  var h='<div style="background:linear-gradient(135deg,'+color+'22,'+color+'11);border:1px solid '+color+'44;border-radius:16px;padding:20px;margin-bottom:16px;">';
  h+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">';
  h+='<div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,'+color+','+color+'99);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">'+icon+'</div>';
  h+='<div><div style="font-size:1.05rem;font-weight:800;color:#fff;">'+title+'</div><div style="font-size:.82rem;color:#94a3b8;">'+subtitle+'</div></div>';
  h+='<div style="margin-left:auto;background:'+color+';color:#fff;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:800;">✓ READY</div>';
  h+='</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">';
  for(var i=0;i<badges.length;i++)h+='<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;padding:3px 10px;border-radius:50px;font-size:.75rem;">'+badges[i]+'</span>';
  h+='</div><div style="display:grid;grid-template-columns:repeat('+stats.length+',1fr);gap:10px;">';
  for(var j=0;j<stats.length;j++)h+='<div style="text-align:center;background:rgba(255,255,255,.05);border-radius:8px;padding:8px;"><div style="font-size:1.1rem;font-weight:800;color:'+color+';">'+stats[j].value+'</div><div style="font-size:.7rem;color:#64748b;">'+stats[j].label+'</div></div>';
  h+='</div></div>';el.innerHTML=h;
}

async function dlZip() {
  if (typeof JSZip === 'undefined') { setStatus('JSZip not loaded', '#f87171'); return; }
  var zip = new JSZip();
  zip.file('index.html', document.getElementById('code_html').value);
  zip.file('manifest.json', document.getElementById('code_manifest').value);
  zip.file('sw.js', document.getElementById('code_sw').value);
  var blob = await zip.generateAsync({type:'blob'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('appName').value.replace(/\s+/g,'-').toLowerCase()||'pwa-app') + '.zip';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function generatePWA() {
  var name = document.getElementById('appName').value.trim() || 'MyApp';
  var desc = document.getElementById('appDesc').value.trim() || 'A useful progressive web app';
  var type = document.getElementById('appType').value;
  var themeColor = document.getElementById('themeColor').value;
  var bgColor = document.getElementById('bgColor').value;
  var offline = document.getElementById('offlineMode').checked;

  var navInputs = document.querySelectorAll('.nav-input');
  var navItems = [];
  navInputs.forEach(function(inp) { if (inp.value.trim()) navItems.push(inp.value.trim()); });

  var btn = document.getElementById('genBtn');
  btn.disabled = true; setStatus('Generating PWA...');

  var iconBase64 = '';
  var iconFile = document.getElementById('appIcon').files[0];
  if (iconFile) { try { var r=new FileReader(); iconBase64=await new Promise(function(res,rej){r.onload=function(e){res(e.target.result);};r.onerror=rej;r.readAsDataURL(iconFile);}); } catch(e){} }

  var sys = 'You are an expert PWA developer. Generate complete, working Progressive Web App code. Return ONLY the HTML code for the main app (no markdown fences), no explanations.';
  var prompt = 'Create a complete PWA called "'+name+'" — a '+type+' app. Description: '+desc+'. Theme color: '+themeColor+'. Background: '+bgColor+'. Navigation items: '+navItems.join(', ')+'. Make it fully functional with working navigation between views, local storage for data, and a beautiful UI with the specified colors. Include the manifest.json link and sw.js registration in the HTML. The app should have real interactive functionality appropriate for a '+type+' app.';

  var rawHTML = await callAI(prompt, sys, 3000);
  if (!rawHTML) { setStatus('AI failed', '#f87171'); btn.disabled=false; return; }

  var htmlCode = rawHTML.replace(/^```html\n?/,'').replace(/^```\n?/,'').replace(/```\s*$/,'').trim();

  // Build manifest.json
  var shortName = name.length > 12 ? name.substring(0,12) : name;
  var manifest = {
    "name": name,
    "short_name": shortName,
    "description": desc,
    "start_url": "/",
    "display": "standalone",
    "background_color": bgColor,
    "theme_color": themeColor,
    "orientation": "portrait",
    "icons": [
      {"src": "icon-192.png", "sizes": "192x192", "type": "image/png"},
      {"src": "icon-512.png", "sizes": "512x512", "type": "image/png"}
    ],
    "categories": [type]
  };

  // Build service worker
  var swCode = '// '+name+' Service Worker\nvar CACHE_NAME = "'+name.replace(/\s+/g,'-').toLowerCase()+'-v1";\nvar ASSETS = ["/", "/index.html", "/manifest.json"];\n\nself.addEventListener("install", function(event) {\n  event.waitUntil(\n    caches.open(CACHE_NAME).then(function(cache) {\n      return cache.addAll(ASSETS);\n    })\n  );\n});\n\nself.addEventListener("activate", function(event) {\n  event.waitUntil(\n    caches.keys().then(function(keys) {\n      return Promise.all(keys.filter(function(k){return k!==CACHE_NAME;}).map(function(k){return caches.delete(k);}));\n    })\n  );\n});\n\nself.addEventListener("fetch", function(event) {\n  event.respondWith(\n    caches.match(event.request).then(function(cached) {\n      return cached || fetch(event.request).catch(function(){\n        return caches.match("/");\n      });\n    })\n  );\n});';

  if (!offline) swCode = '// Service worker disabled (offline mode off)\nself.addEventListener("fetch", function(){});';

  document.getElementById('code_html').value = htmlCode;
  document.getElementById('code_manifest').value = JSON.stringify(manifest, null, 2);
  document.getElementById('code_sw').value = swCode;

  document.getElementById('dlBtn').style.display = 'inline-block';
  setStatus('PWA generated!');
  btn.disabled = false;

  showCard(name, type+' PWA', '📱', themeColor,
    ['PWA','Installable','HTML5','Offline-ready'],
    [{value:'3',label:'Files'},{value:navItems.length+'',label:'Views'},{value:offline?'Yes':'No',label:'Offline'}]);
}
</script>
</body>
</html>
