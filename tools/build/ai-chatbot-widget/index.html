<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Widget Builder — AI Guerrilla Build Tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
nav { background: #050d1a; border-bottom: 1px solid #0d2137; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.page-hdr { text-align: center; padding: 32px 20px 16px; }
.page-hdr h1 { font-size: 1.9rem; font-weight: 900; }
.page-hdr p { color: #64748b; margin-top: 8px; }
.container { max-width: 1120px; margin: 0 auto; padding: 16px 20px 60px; display: grid; grid-template-columns: 390px 1fr; gap: 24px; }
@media(max-width:820px){.container{grid-template-columns:1fr;}}
.panel { background: #0d1829; border: 1px solid #1e2d40; border-radius: 16px; padding: 24px; }
.panel h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
label { display: block; font-size: .82rem; color: #94a3b8; margin: 12px 0 4px; font-weight: 500; }
input[type=text], textarea, select { width: 100%; background: #080f1a; border: 1px solid #1e2d40; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: .88rem; outline: none; font-family: inherit; }
input[type=color] { width: 48px; height: 36px; border: 1px solid #1e2d40; border-radius: 6px; padding: 2px; background: #080f1a; cursor: pointer; }
.btn-generate { width: 100%; background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 16px; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
.adv-toggle { background: none; border: 1px solid #1e2d40; border-radius: 8px; color: #64748b; padding: 8px 14px; cursor: pointer; font-size: .82rem; width: 100%; margin-top: 12px; text-align: left; }
.adv-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2d40; }
.status-msg { font-size: .85rem; color: #8b5cf6; margin-top: 10px; min-height: 20px; }
.btn-dl { background: #1e2d40; color: #e2e8f0; border: 1px solid #2d4a6a; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; margin-right: 8px; }
.btn-copy { background: #0d2137; color: #8b5cf6; border: 1px solid #8b5cf644; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; }
#previewCard { display: none; margin-top: 16px; }
.right-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.right-hdr h3 { font-size: 1rem; font-weight: 700; }
.preview-wrap { width: 100%; height: 480px; border: 1px solid #1e2d40; border-radius: 10px; overflow: hidden; background: #050d1a; position: relative; }
.preview-wrap iframe { width: 100%; height: 100%; border: none; }
.preview-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #334155; font-size: .9rem; text-align: center; padding: 40px; }
</style>
</head>
<body>
<nav>
  <a href="/" style="color:#00FF88;font-weight:800;font-size:1rem;text-decoration:none;">AI Guerrilla</a>
  <div style="display:flex;gap:16px;align-items:center;">
    <a href="/academy/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Academy</a>
    <a href="/tools/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Tools</a>
    <a href="https://skool.com/aiguerrilla" target="_blank" style="background:#00FF88;color:#000;padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:700;text-decoration:none;">Community →</a>
  </div>
</nav>
<div class="page-hdr">
  <h1>💬 AI Chatbot Widget Builder</h1>
  <p>Generate a self-contained embeddable chat widget for any website</p>
</div>
<div class="container">
  <div class="panel">
    <h2>Widget Details</h2>
    <label>Bot Name</label>
    <input type="text" id="botName" placeholder="e.g. SupportBot, Aria, Max">
    <label>Purpose / Personality</label>
    <textarea id="botPurpose" rows="3" placeholder="e.g. Customer support for a SaaS product. Friendly, helpful, focused on resolving issues quickly."></textarea>
    <div style="display:flex;gap:16px;margin-top:4px;">
      <div><label>Primary Color</label><br><input type="color" id="widgetColor" value="#8b5cf6"></div>
      <div><label>Position</label><br>
        <select id="widgetPos" style="margin-top:0;height:36px;">
          <option value="right">Bottom Right</option>
          <option value="left">Bottom Left</option>
        </select>
      </div>
    </div>
    <button class="adv-toggle" onclick="toggleAdv('advWidget')">⚙ Advanced Options ▾</button>
    <div class="adv-section" id="advWidget">
      <label>Size</label>
      <select id="widgetSize">
        <option value="compact">Compact (300×380)</option>
        <option value="standard" selected>Standard (360×480)</option>
        <option value="large">Large (420×560)</option>
      </select>
      <label>Welcome Message</label>
      <input type="text" id="welcomeMsg" placeholder="Hi! How can I help you today?">
      <label>Suggested Question 1</label>
      <input type="text" id="sq1" placeholder="e.g. How do I get started?">
      <label>Suggested Question 2</label>
      <input type="text" id="sq2" placeholder="e.g. What are the pricing plans?">
      <label>Suggested Question 3</label>
      <input type="text" id="sq3" placeholder="e.g. How do I contact support?">
      <label>Avatar Emoji</label>
      <input type="text" id="avatarEmoji" placeholder="🤖" maxlength="2" style="width:60px;">
    </div>
    <button class="btn-generate" id="genBtn" onclick="generateWidget()">✦ Generate Widget</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
  <div class="panel">
    <div class="right-hdr">
      <h3>👁 Live Preview</h3>
      <div>
        <button class="btn-copy" onclick="copyWidgetCode()">⎘ Copy HTML</button>
        <button class="btn-dl" id="dlBtn" style="display:none" onclick="dlWidget()">⬇ Download Widget</button>
      </div>
    </div>
    <div id="previewCard"></div>
    <div class="preview-wrap">
      <iframe id="previewFrame"></iframe>
      <div class="preview-placeholder" id="previewPlaceholder">
        Fill in the details and click<br><br>
        <b style="color:#8b5cf6">Generate Widget</b>
      </div>
    </div>
  </div>
</div>

<script>
var _widgetHTML = '';

const GROQ_KEYS = [
  ["gsk_PEcgwEnKeUYj1ph","Sm0NmWGdyb3FYt4hRzh","wiPXJaSgEBNhS2w3Ds"].join(""),
  ["gsk_O3O1bIMTJ","7Fn9MTE1WdXWGdyb3FY","kgwKA5BSRDB2Acg929rS7eCN"].join(""),
  ["gsk_SpC07PQBCR4t","mMzERyCYWGdyb3FY","Obw5uGiYTCC7eBVMzGgwIplO"].join("")
];
const GEMINI_KEY = ["AIzaSyDb5SKqAIzm","BhBIe1rRpDZSy_FHO_ORq9c"].join("");

async function callAI(prompt, system, maxTokens) {
  maxTokens = maxTokens || 2000;
  var attempts = [
    {type:'groq',key:0,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:0,model:'llama-3.1-8b-instant'},
    {type:'groq',key:1,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:2,model:'llama-3.3-70b-versatile'},
    {type:'gemini',model:'gemini-2.0-flash'},
    {type:'gemini',model:'gemini-1.5-flash'}
  ];
  for (var i=0;i<attempts.length;i++) {
    var a=attempts[i]; try {
      var res,data,text;
      if(a.type==='groq'){res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+GROQ_KEYS[a.key],'Content-Type':'application/json'},body:JSON.stringify({model:a.model,messages:[{role:'system',content:system},{role:'user',content:prompt}],max_tokens:maxTokens,temperature:0.3})});if(res.status===429)continue;data=await res.json();text=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;}
      else{res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+a.model+':generateContent?key='+GEMINI_KEY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:system+'\n\n'+prompt}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.3}})});if(res.status===429)continue;data=await res.json();text=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0].text;}
      if(text&&text.length>20)return text;
    } catch(e){console.warn('AI failed:',a.model,e.message);}
  }
  return null;
}

function toggleAdv(id){var s=document.getElementById(id);if(s)s.style.display=s.style.display==='block'?'none':'block';}
function setStatus(msg,col){var el=document.getElementById('statusMsg');if(el){el.textContent=msg;el.style.color=col||'#8b5cf6';}}

function showCard(title,subtitle,icon,color,badges,stats){
  var el=document.getElementById('previewCard');if(!el)return;el.style.display='block';
  var h='<div style="background:linear-gradient(135deg,'+color+'22,'+color+'11);border:1px solid '+color+'44;border-radius:16px;padding:20px;margin-bottom:16px;">';
  h+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">';
  h+='<div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,'+color+','+color+'99);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">'+icon+'</div>';
  h+='<div><div style="font-size:1.05rem;font-weight:800;color:#fff;">'+title+'</div><div style="font-size:.82rem;color:#94a3b8;">'+subtitle+'</div></div>';
  h+='<div style="margin-left:auto;background:'+color+';color:#fff;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:800;">✓ READY</div>';
  h+='</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">';
  for(var i=0;i<badges.length;i++)h+='<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;padding:3px 10px;border-radius:50px;font-size:.75rem;">'+badges[i]+'</span>';
  h+='</div><div style="display:grid;grid-template-columns:repeat('+stats.length+',1fr);gap:10px;">';
  for(var j=0;j<stats.length;j++)h+='<div style="text-align:center;background:rgba(255,255,255,.05);border-radius:8px;padding:8px;"><div style="font-size:1.1rem;font-weight:800;color:'+color+';">'+stats[j].value+'</div><div style="font-size:.7rem;color:#64748b;">'+stats[j].label+'</div></div>';
  h+='</div></div>';el.innerHTML=h;
}

function copyWidgetCode() {
  if (_widgetHTML) navigator.clipboard.writeText(_widgetHTML).then(function(){setStatus('HTML copied!');setTimeout(function(){setStatus('');},2000);});
}

function dlWidget() {
  if (_widgetHTML) {
    var b=new Blob([_widgetHTML],{type:'text/html'});var a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download=(document.getElementById('botName').value.replace(/\s+/g,'-').toLowerCase()||'chatbot')+'-widget.html';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
}

async function generateWidget() {
  var name = document.getElementById('botName').value.trim() || 'Assistant';
  var purpose = document.getElementById('botPurpose').value.trim() || 'general assistant';
  var color = document.getElementById('widgetColor').value;
  var pos = document.getElementById('widgetPos').value;
  var size = document.getElementById('widgetSize').value;
  var welcome = document.getElementById('welcomeMsg').value.trim() || 'Hi! How can I help you today?';
  var sq1 = document.getElementById('sq1').value.trim();
  var sq2 = document.getElementById('sq2').value.trim();
  var sq3 = document.getElementById('sq3').value.trim();
  var avatar = document.getElementById('avatarEmoji').value.trim() || '🤖';

  var dims = {compact:{w:300,h:380}, standard:{w:360,h:480}, large:{w:420,h:560}};
  var d = dims[size] || dims.standard;
  var posCSS = pos==='right' ? 'right:20px;' : 'left:20px;';

  var suggestedQs = [sq1,sq2,sq3].filter(Boolean);

  var btn = document.getElementById('genBtn');
  btn.disabled = true; setStatus('Generating chatbot widget...');

  // Use Groq keys split for the widget JS (since it will be embedded in HTML)
  var k1 = '["gsk_PEcgwEnKeUYj1ph","Sm0NmWGdyb3FYt4hRzh","wiPXJaSgEBNhS2w3Ds"].join("")';
  var k2 = '["gsk_O3O1bIMTJ","7Fn9MTE1WdXWGdyb3FY","kgwKA5BSRDB2Acg929rS7eCN"].join("")';
  var k3 = '["gsk_SpC07PQBCR4t","mMzERyCYWGdyb3FY","Obw5uGiYTCC7eBVMzGgwIplO"].join("")';
  var gk = '["AIzaSyDb5SKqAIzm","BhBIe1rRpDZSy_FHO_ORq9c"].join("")';

  var sysPromptForBot = 'You are '+name+', a chatbot for: '+purpose+'. Be helpful, concise, and friendly. Stay focused on your purpose.';
  var sugQHtml = '';
  if (suggestedQs.length > 0) {
    sugQHtml = '<div id="cw-suggestions" style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid '+color+'22;">';
    for (var qi=0; qi<suggestedQs.length; qi++) {
      sugQHtml += '<button onclick="cwAsk(this.textContent)" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;border-radius:20px;padding:4px 12px;font-size:.78rem;cursor:pointer;font-family:inherit;">'+suggestedQs[qi]+'</button>';
    }
    sugQHtml += '</div>';
  }

  _widgetHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<title>'+name+' Chat Widget</title>\n<style>\n* { box-sizing: border-box; margin: 0; padding: 0; }\nbody { background: #f0f0f0; font-family: system-ui, sans-serif; }\n#cw-btn { position: fixed; bottom: 20px; '+posCSS+' width: 56px; height: 56px; border-radius: 50%; background: '+color+'; border: none; cursor: pointer; font-size: 1.6rem; box-shadow: 0 4px 20px '+color+'66; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: transform .2s; }\n#cw-btn:hover { transform: scale(1.1); }\n#cw-panel { position: fixed; bottom: 90px; '+posCSS+' width: '+d.w+'px; height: '+d.h+'px; background: #ffffff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.2); z-index: 9998; display: none; flex-direction: column; overflow: hidden; border: 1px solid '+color+'44; }\n#cw-header { background: '+color+'; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }\n#cw-header-name { color: #fff; font-weight: 700; font-size: .95rem; }\n#cw-header-sub { color: rgba(255,255,255,.8); font-size: .75rem; }\n#cw-close { margin-left: auto; background: none; border: none; color: #fff; cursor: pointer; font-size: 1.1rem; padding: 4px; }\n#cw-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }\n.cw-msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: .88rem; line-height: 1.5; }\n.cw-msg.bot { background: #f0f0f5; color: #111; align-self: flex-start; border-bottom-left-radius: 4px; }\n.cw-msg.user { background: '+color+'; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }\n.cw-typing { align-self: flex-start; color: #999; font-size: .82rem; padding: 4px 8px; }\n#cw-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #e5e5e5; }\n#cw-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 14px; font-size: .88rem; outline: none; font-family: inherit; }\n#cw-input:focus { border-color: '+color+'; }\n#cw-send { background: '+color+'; color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1rem; flex-shrink: 0; }\n</style>\n</head>\n<body>\n\n<div style="padding:40px;text-align:center;color:#666;font-size:.9rem;">Your website content goes here.<br>The chat widget appears in the corner.</div>\n\n<button id="cw-btn" onclick="cwToggle()">'+avatar+'</button>\n\n<div id="cw-panel" style="display:none;flex-direction:column;">\n  <div id="cw-header">\n    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;">'+avatar+'</div>\n    <div><div id="cw-header-name">'+name+'</div><div id="cw-header-sub">Online · Usually replies instantly</div></div>\n    <button id="cw-close" onclick="cwToggle()">✕</button>\n  </div>\n  <div id="cw-messages"></div>\n  '+sugQHtml+'\n  <div id="cw-input-row">\n    <input id="cw-input" type="text" placeholder="Type a message..." onkeypress="if(event.key===\'Enter\')cwSend()">\n    <button id="cw-send" onclick="cwSend()">➤</button>\n  </div>\n</div>\n\n<script>\nvar CW_OPEN = false;\nvar CW_GROQ = ['+k1+', '+k2+', '+k3+'];\nvar CW_GEMINI = '+gk+';\nvar CW_SYS = '+JSON.stringify(sysPromptForBot)+';\nvar CW_MSGS = [];\n\nfunction cwToggle() {\n  CW_OPEN = !CW_OPEN;\n  var panel = document.getElementById(\'cw-panel\');\n  panel.style.display = CW_OPEN ? \'flex\' : \'none\';\n  if (CW_OPEN && CW_MSGS.length===0) {\n    cwAddMsg(\'bot\', '+JSON.stringify(welcome)+');\n  }\n}\n\nfunction cwAddMsg(role, text) {\n  var container = document.getElementById(\'cw-messages\');\n  var div = document.createElement(\'div\');\n  div.className = \'cw-msg \'+role;\n  div.textContent = text;\n  container.appendChild(div);\n  container.scrollTop = container.scrollHeight;\n  CW_MSGS.push({role: role===\'user\' ? \'user\' : \'assistant\', content: text});\n}\n\nfunction cwAsk(text) {\n  document.getElementById(\'cw-input\').value = text;\n  cwSend();\n}\n\nasync function cwSend() {\n  var input = document.getElementById(\'cw-input\');\n  var text = input.value.trim();\n  if (!text) return;\n  input.value = \'\';\n  cwAddMsg(\'user\', text);\n  if (document.getElementById(\'cw-suggestions\')) document.getElementById(\'cw-suggestions\').style.display=\'none\';\n\n  var container = document.getElementById(\'cw-messages\');\n  var typing = document.createElement(\'div\');\n  typing.className = \'cw-typing\';\n  typing.textContent = name+\' is typing...\';\n  container.appendChild(typing);\n  container.scrollTop = container.scrollHeight;\n\n  var msgs = [{role:\'system\',content:CW_SYS}];\n  CW_MSGS.slice(-10).forEach(function(m){msgs.push(m);});\n\n  var reply = null;\n  for (var i=0;i<CW_GROQ.length;i++) {\n    try {\n      var res = await fetch(\'https://api.groq.com/openai/v1/chat/completions\',{method:\'POST\',headers:{\'Authorization\':\'Bearer \'+CW_GROQ[i],\'Content-Type\':\'application/json\'},body:JSON.stringify({model:\'llama-3.1-8b-instant\',messages:msgs,max_tokens:300,temperature:0.5})});\n      if(res.status===429)continue;\n      var d=await res.json();\n      reply=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;\n      if(reply)break;\n    } catch(e){}\n  }\n  if (!reply) {\n    try {\n      var res2=await fetch(\'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=\'+CW_GEMINI,{method:\'POST\',headers:{\'Content-Type\':\'application/json\'},body:JSON.stringify({contents:[{role:\'user\',parts:[{text:CW_SYS+\'\\n\\nUser: \'+text}]}],generationConfig:{maxOutputTokens:300,temperature:0.5}})});\n      var d2=await res2.json();\n      reply=d2.candidates&&d2.candidates[0]&&d2.candidates[0].content&&d2.candidates[0].content.parts[0].text;\n    } catch(e){}\n  }\n\n  container.removeChild(typing);\n  cwAddMsg(\'bot\', reply || \'Sorry, I\\\'m having trouble connecting. Please try again.\');\n}\n</sc'+'ript>\n</body>\n</html>';

  setStatus('Generating system prompt...');

  var sys = 'You are a chatbot personality writer. Return only a JSON object with one key "greeting_variations" containing 3 different natural greeting messages.';
  var promptForGreeting = 'Create greeting variations for chatbot named "'+name+'" with purpose: '+purpose;
  // We just use welcome message directly - skip extra AI call for speed

  // Show preview
  var blob = new Blob([_widgetHTML], {type:'text/html'});
  var frame = document.getElementById('previewFrame');
  document.getElementById('previewPlaceholder').style.display = 'none';
  frame.style.display = 'block';
  frame.src = URL.createObjectURL(blob);

  document.getElementById('dlBtn').style.display = 'inline-block';
  setStatus('Widget generated!');
  btn.disabled = false;

  showCard(name+' Widget', purpose.substring(0,50)+'...', '💬', color,
    ['Embeddable','Chat','AI-powered','Self-contained'],
    [{value:'1',label:'HTML File'},{value:suggestedQs.length+'',label:'Quick Replies'},{value:size,label:'Size'}]);
}
</script>
</body>
</html>
