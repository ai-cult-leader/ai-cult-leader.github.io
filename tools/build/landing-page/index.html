<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page Generator — AI Guerrilla Build Tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
nav { background: #050d1a; border-bottom: 1px solid #0d2137; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.page-hdr { text-align: center; padding: 32px 20px 16px; }
.page-hdr h1 { font-size: 1.9rem; font-weight: 900; }
.page-hdr p { color: #64748b; margin-top: 8px; }
.container { max-width: 1120px; margin: 0 auto; padding: 16px 20px 60px; display: grid; grid-template-columns: 390px 1fr; gap: 24px; }
@media(max-width:820px){.container{grid-template-columns:1fr;}}
.panel { background: #0d1829; border: 1px solid #1e2d40; border-radius: 16px; padding: 24px; }
.panel h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
label { display: block; font-size: .82rem; color: #94a3b8; margin: 12px 0 4px; font-weight: 500; }
input[type=text], textarea, select { width: 100%; background: #080f1a; border: 1px solid #1e2d40; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: .88rem; outline: none; font-family: inherit; }
input[type=text]:focus, textarea:focus { border-color: #6366f1; }
input[type=color] { width: 48px; height: 36px; border: 1px solid #1e2d40; border-radius: 6px; padding: 2px; background: #080f1a; cursor: pointer; }
input[type=file] { color: #94a3b8; font-size: .82rem; }
input[type=checkbox] { width: 16px; height: 16px; accent-color: #6366f1; cursor: pointer; }
.check-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.check-row label { margin: 0; color: #e2e8f0; cursor: pointer; }
.btn-generate { width: 100%; background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 16px; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
.adv-toggle { background: none; border: 1px solid #1e2d40; border-radius: 8px; color: #64748b; padding: 8px 14px; cursor: pointer; font-size: .82rem; width: 100%; margin-top: 12px; text-align: left; }
.adv-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2d40; }
.status-msg { font-size: .85rem; color: #6366f1; margin-top: 10px; min-height: 20px; }
.btn-dl { background: #1e2d40; color: #e2e8f0; border: 1px solid #2d4a6a; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; }
#previewCard { display: none; margin-top: 16px; }
.right-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.right-hdr h3 { font-size: 1rem; font-weight: 700; }
</style>
</head>
<body>
<nav>
  <a href="/" style="color:#00FF88;font-weight:800;font-size:1rem;text-decoration:none;">AI Guerrilla</a>
  <div style="display:flex;gap:16px;align-items:center;">
    <a href="/academy/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Academy</a>
    <a href="/tools/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Tools</a>
    <a href="https://skool.com/aiguerrilla" target="_blank" style="background:#00FF88;color:#000;padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:700;text-decoration:none;">Community →</a>
  </div>
</nav>
<div class="page-hdr">
  <h1>🚀 Landing Page Generator</h1>
  <p>Create high-converting single-product landing pages with AI</p>
</div>
<div class="container">
  <div class="panel">
    <h2>Product Details</h2>
    <label>Product / Offer Name</label>
    <input type="text" id="prodName" placeholder="e.g. LaunchKit Pro">
    <label>One-Line Tagline</label>
    <input type="text" id="prodTagline" placeholder="e.g. Ship faster than ever">
    <label>Target Audience</label>
    <input type="text" id="targetAudience" placeholder="e.g. SaaS founders, freelancers">
    <label>Main Benefit</label>
    <textarea id="mainBenefit" rows="2" placeholder="What's the #1 result customers get?"></textarea>
    <label>Price / Offer</label>
    <input type="text" id="priceOffer" placeholder="e.g. $97 one-time / Free trial">
    <label>CTA Button Text</label>
    <input type="text" id="ctaText" placeholder="e.g. Get Instant Access">
    <div style="display:flex;gap:16px;margin-top:4px;">
      <div><label>Primary Color</label><br><input type="color" id="lp_color" value="#6366f1"></div>
      <div><label>Background</label><br>
        <select id="lp_bg" style="margin-top:0;height:36px;">
          <option value="dark">Dark</option><option value="light">Light</option>
        </select>
      </div>
    </div>
    <button class="adv-toggle" onclick="toggleAdv('advLP')">⚙ Advanced Options ▾</button>
    <div class="adv-section" id="advLP">
      <label>Font</label>
      <select id="lp_font"><option>Segoe UI</option><option>Georgia</option><option>system-ui</option></select>
      <label>Logo (optional)</label>
      <input type="file" id="lp_logo" accept="image/*">
      <div style="margin-top:14px;font-size:.82rem;font-weight:700;color:#e2e8f0;">Include Sections</div>
      <div class="check-row"><input type="checkbox" id="lp_benefits" checked><label for="lp_benefits">Benefits list</label></div>
      <div class="check-row"><input type="checkbox" id="lp_social" checked><label for="lp_social">Social proof / testimonial</label></div>
      <div class="check-row"><input type="checkbox" id="lp_pricing" checked><label for="lp_pricing">Pricing / Offer box</label></div>
      <div class="check-row"><input type="checkbox" id="lp_guarantee" checked><label for="lp_guarantee">Guarantee badge</label></div>
    </div>
    <button class="btn-generate" id="genBtn" onclick="generateLP()">✦ Generate Landing Page</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
  <div class="panel">
    <div class="right-hdr">
      <h3>🖥 Live Preview</h3>
      <button class="btn-dl" id="dlBtn" style="display:none" onclick="dlLP()">⬇ Download HTML</button>
    </div>
    <div id="previewCard"></div>
    <iframe id="previewFrame" style="width:100%;height:520px;border:1px solid #1e2d40;border-radius:10px;background:#050d1a;" srcdoc="<div style='display:flex;align-items:center;justify-content:center;height:100%;background:#050d1a;color:#334155;font-family:system-ui;font-size:.95rem;text-align:center;padding:40px;'>Fill in details and click<br><br><b style=color:#6366f1>Generate Landing Page</b></div>"></iframe>
  </div>
</div>

<script>
var _lpHTML = '';

const GROQ_KEYS = [
  ["gsk_PEcgwEnKeUYj1ph","Sm0NmWGdyb3FYt4hRzh","wiPXJaSgEBNhS2w3Ds"].join(""),
  ["gsk_O3O1bIMTJ","7Fn9MTE1WdXWGdyb3FY","kgwKA5BSRDB2Acg929rS7eCN"].join(""),
  ["gsk_SpC07PQBCR4t","mMzERyCYWGdyb3FY","Obw5uGiYTCC7eBVMzGgwIplO"].join("")
];
const GEMINI_KEY = ["AIzaSyDb5SKqAIzm","BhBIe1rRpDZSy_FHO_ORq9c"].join("");

async function callAI(prompt, system, maxTokens) {
  maxTokens = maxTokens || 2000;
  var attempts = [
    {type:'groq',key:0,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:0,model:'llama-3.1-8b-instant'},
    {type:'groq',key:1,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:2,model:'llama-3.3-70b-versatile'},
    {type:'gemini',model:'gemini-2.0-flash'},
    {type:'gemini',model:'gemini-1.5-flash'}
  ];
  for (var i=0; i<attempts.length; i++) {
    var a = attempts[i];
    try {
      var res, data, text;
      if (a.type==='groq') {
        res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method:'POST', headers:{'Authorization':'Bearer '+GROQ_KEYS[a.key],'Content-Type':'application/json'},
          body:JSON.stringify({model:a.model,messages:[{role:'system',content:system},{role:'user',content:prompt}],max_tokens:maxTokens,temperature:0.3})
        });
        if (res.status===429) continue;
        data = await res.json();
        text = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      } else {
        res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+a.model+':generateContent?key='+GEMINI_KEY, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{role:'user',parts:[{text:system+'\n\n'+prompt}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.3}})
        });
        if (res.status===429) continue;
        data = await res.json();
        text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
      }
      if (text && text.length > 20) return text;
    } catch(e) { console.warn('AI failed:', a.model, e.message); }
  }
  return null;
}

function toggleAdv(id) { var s=document.getElementById(id); if(s) s.style.display=s.style.display==='block'?'none':'block'; }
function setStatus(msg,col) { var el=document.getElementById('statusMsg'); if(el){el.textContent=msg;el.style.color=col||'#6366f1';} }

function fileToBase64(file) {
  return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.onerror=rej;r.readAsDataURL(file);});
}

function showCard(title,subtitle,icon,color,badges,stats) {
  var el=document.getElementById('previewCard'); if(!el)return;
  el.style.display='block';
  var h='<div style="background:linear-gradient(135deg,'+color+'22,'+color+'11);border:1px solid '+color+'44;border-radius:16px;padding:24px;">';
  h+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">';
  h+='<div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,'+color+','+color+'99);display:flex;align-items:center;justify-content:center;font-size:1.6rem;">'+icon+'</div>';
  h+='<div><div style="font-size:1.1rem;font-weight:800;color:#fff;">'+title+'</div><div style="font-size:.85rem;color:#94a3b8;">'+subtitle+'</div></div>';
  h+='<div style="margin-left:auto;background:'+color+';color:#000;padding:4px 12px;border-radius:50px;font-size:.75rem;font-weight:800;">✓ READY</div>';
  h+='</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">';
  for(var i=0;i<badges.length;i++) h+='<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;padding:3px 10px;border-radius:50px;font-size:.75rem;">'+badges[i]+'</span>';
  h+='</div><div style="display:grid;grid-template-columns:repeat('+stats.length+',1fr);gap:12px;">';
  for(var j=0;j<stats.length;j++) h+='<div style="text-align:center;background:rgba(255,255,255,.05);border-radius:8px;padding:10px;"><div style="font-size:1.2rem;font-weight:800;color:'+color+';">'+stats[j].value+'</div><div style="font-size:.7rem;color:#64748b;">'+stats[j].label+'</div></div>';
  h+='</div></div>';
  el.innerHTML=h;
}

async function generateLP() {
  var name = document.getElementById('prodName').value.trim() || 'My Product';
  var tagline = document.getElementById('prodTagline').value.trim() || 'The best solution for your needs';
  var audience = document.getElementById('targetAudience').value.trim() || 'entrepreneurs';
  var benefit = document.getElementById('mainBenefit').value.trim() || 'save time and make more money';
  var price = document.getElementById('priceOffer').value.trim() || 'Free to start';
  var cta = document.getElementById('ctaText').value.trim() || 'Get Started Now';
  var color = document.getElementById('lp_color').value;
  var bgStyle = document.getElementById('lp_bg').value;
  var font = document.getElementById('lp_font').value;
  var incBenefits = document.getElementById('lp_benefits').checked;
  var incSocial = document.getElementById('lp_social').checked;
  var incPricing = document.getElementById('lp_pricing').checked;
  var incGuarantee = document.getElementById('lp_guarantee').checked;

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  setStatus('Generating copy...');

  var logoBase64 = '';
  var logoFile = document.getElementById('lp_logo').files[0];
  if (logoFile) { try { logoBase64 = await fileToBase64(logoFile); } catch(e){} }

  var sys = 'You are a conversion copywriter specializing in landing pages. Return ONLY a raw JSON object, no markdown.';
  var prompt = 'Write high-converting landing page copy for "'+name+'" targeted at '+audience+'. Tagline: '+tagline+'. Main benefit: '+benefit+'. Price: '+price+'. Return ONLY this JSON with no extra text: {"headline":"short bold headline","subheadline":"1 sentence","benefits":["benefit 1","benefit 2","benefit 3"],"social_proof":{"quote":"testimonial","name":"Customer Name","result":"result achieved"},"urgency":"urgency line","guarantee":"30-day guarantee","offer_headline":"offer headline","offer_features":["feature 1","feature 2"]}';

  var raw = await callAI(prompt, sys, 2500);
  if (!raw) { setStatus('AI call failed', '#f87171'); btn.disabled=false; return; }

  var copy;
  try {
    var s=raw.indexOf('{'), e=raw.lastIndexOf('}');
    if(s===-1||e===-1){throw new Error('No JSON found');}
    var jsonStr=raw.substring(s,e+1);
    // Fix truncated arrays/strings
    jsonStr=jsonStr.replace(/,\s*["}]\s*$/,'').replace(/:\s*"[^"]*$/,':"..."');
    // Count braces to ensure closure
    var opens=0,closes=0;
    for(var i=0;i<jsonStr.length;i++){if(jsonStr[i]==='{')opens++;if(jsonStr[i]==='}')closes++;}
    while(closes<opens){jsonStr+='}';closes++;}
    copy = JSON.parse(jsonStr);
  } catch(err) {
    // Last resort: use defaults
    copy = {headline:name+' — '+tagline,subheadline:benefit,benefits:[benefit,'Save time','Easy to use'],social_proof:{quote:'Amazing product!',name:'Happy Customer',result:'Great results'},urgency:'Limited time offer',guarantee:'30-day money-back guarantee',offer_headline:'Get '+name+' Today',offer_features:['Full access','Support included']};
  }

  var bg = bgStyle==='dark' ? '#080808' : '#f8f8f8';
  var fg = bgStyle==='dark' ? '#ffffff' : '#111111';
  var cardBg = bgStyle==='dark' ? '#141414' : '#ffffff';

  var logoHtml = logoBase64 ? '<img src="'+logoBase64+'" alt="'+name+'" style="height:44px;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;">' : '';

  var benefitsHTML = '';
  if (incBenefits && copy.benefits) {
    benefitsHTML = '<section style="padding:70px 20px;background:'+cardBg+';">';
    benefitsHTML += '<div style="max-width:640px;margin:0 auto;">';
    benefitsHTML += '<h2 style="text-align:center;font-size:1.8rem;font-weight:800;color:'+fg+';margin-bottom:36px;">What You\'ll Get</h2>';
    for (var i=0;i<copy.benefits.length;i++) {
      benefitsHTML += '<div style="display:flex;align-items:flex-start;gap:14px;padding:16px;margin-bottom:12px;background:'+bg+';border-radius:10px;border-left:3px solid '+color+';">';
      benefitsHTML += '<span style="color:'+color+';font-size:1.3rem;font-weight:900;flex-shrink:0;">✓</span>';
      benefitsHTML += '<span style="color:'+fg+';line-height:1.5;">'+copy.benefits[i]+'</span></div>';
    }
    benefitsHTML += '</div></section>';
  }

  var socialHTML = '';
  if (incSocial && copy.social_proof) {
    socialHTML = '<section style="padding:60px 20px;background:'+color+'11;">';
    socialHTML += '<div style="max-width:600px;margin:0 auto;text-align:center;">';
    socialHTML += '<p style="font-size:1.25rem;font-style:italic;color:'+fg+';line-height:1.7;margin-bottom:16px;">&ldquo;'+copy.social_proof.quote+'&rdquo;</p>';
    socialHTML += '<div style="font-weight:700;color:'+color+';">'+copy.social_proof.name+'</div>';
    socialHTML += '<div style="color:'+fg+';opacity:.7;font-size:.9rem;">Result: '+copy.social_proof.result+'</div>';
    socialHTML += '</div></section>';
  }

  var pricingHTML = '';
  if (incPricing) {
    pricingHTML = '<section id="offer" style="padding:70px 20px;background:'+cardBg+';">';
    pricingHTML += '<div style="max-width:520px;margin:0 auto;text-align:center;">';
    pricingHTML += '<h2 style="font-size:1.9rem;font-weight:800;color:'+fg+';margin-bottom:8px;">'+(copy.offer_headline||'Get Started Today')+'</h2>';
    pricingHTML += '<div style="font-size:2.5rem;font-weight:900;color:'+color+';margin:16px 0;">'+price+'</div>';
    if (copy.offer_features) {
      for (var oi=0;oi<copy.offer_features.length;oi++) {
        pricingHTML += '<div style="color:'+fg+';margin:8px 0;">✓ '+copy.offer_features[oi]+'</div>';
      }
    }
    pricingHTML += '<a href="#" style="display:block;background:'+color+';color:#000;padding:18px 36px;border-radius:10px;font-weight:800;font-size:1.15rem;margin-top:24px;text-decoration:none;">'+cta+'</a>';
    if (copy.urgency) pricingHTML += '<p style="color:'+fg+';opacity:.6;font-size:.85rem;margin-top:12px;">'+copy.urgency+'</p>';
    pricingHTML += '</div></section>';
  }

  var guaranteeHTML = '';
  if (incGuarantee) {
    guaranteeHTML = '<section style="padding:40px 20px;background:'+bg+';">';
    guaranteeHTML += '<div style="max-width:480px;margin:0 auto;text-align:center;background:'+cardBg+';border:2px dashed '+color+'44;border-radius:12px;padding:28px;">';
    guaranteeHTML += '<div style="font-size:2.5rem;margin-bottom:10px;">🛡</div>';
    guaranteeHTML += '<div style="font-weight:800;color:'+fg+';font-size:1.1rem;margin-bottom:8px;">Our Guarantee</div>';
    guaranteeHTML += '<div style="color:'+fg+';opacity:.75;line-height:1.6;">'+(copy.guarantee||'30-day money-back guarantee. No questions asked.')+'</div>';
    guaranteeHTML += '</div></section>';
  }

  _lpHTML = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>'+name+' — '+tagline+'</title>\n<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'+font+',system-ui,sans-serif;}a{text-decoration:none;}</style>\n</head>\n<body>\n'
    +'<section style="background:'+bg+';min-height:90vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 20px;">'
    +'<div style="max-width:760px;">'+logoHtml
    +'<div style="font-size:.8rem;letter-spacing:3px;text-transform:uppercase;color:'+color+';margin-bottom:16px;">'+tagline+'</div>'
    +'<h1 style="font-size:3.2rem;font-weight:900;color:'+fg+';line-height:1.1;margin-bottom:18px;">'+copy.headline+'</h1>'
    +'<p style="font-size:1.2rem;color:'+fg+';opacity:.8;margin-bottom:36px;line-height:1.6;">'+copy.subheadline+'</p>'
    +'<a href="#offer" style="display:inline-block;background:'+color+';color:#000;padding:16px 36px;border-radius:8px;font-weight:800;font-size:1.1rem;">'+cta+'</a>'
    +'</div></section>\n'
    +benefitsHTML+socialHTML+pricingHTML+guaranteeHTML
    +'<footer style="background:#050505;color:#555;text-align:center;padding:24px;font-size:.82rem;">© 2025 '+name+'</footer>\n'
    +'</body>\n</html>';

  var blob = new Blob([_lpHTML], {type:'text/html'});
  document.getElementById('previewFrame').src = URL.createObjectURL(blob);
  document.getElementById('dlBtn').style.display = 'inline-block';
  setStatus('Landing page generated!');
  btn.disabled = false;

  showCard(name, 'High-converting landing page', '🚀', color,
    ['HTML5','Conversion-optimized',font,'Responsive'],
    [{value:'1',label:'HTML File'},{value:''+(copy.benefits?copy.benefits.length:0),label:'Benefits'},{value:price,label:'Offer'}]);
}

function dlLP() { if(_lpHTML) { var b=new Blob([_lpHTML],{type:'text/html'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='landing-page.html'; document.body.appendChild(a); a.click(); document.body.removeChild(a); } }
</script>
</body>
</html>
