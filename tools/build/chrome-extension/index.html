<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrome Extension Creator — AI Guerrilla Build Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow-x: hidden; background: #080f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
nav { background: #050d1a; border-bottom: 1px solid #0d2137; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.page-hdr { text-align: center; padding: 32px 20px 16px; }
.page-hdr h1 { font-size: 1.9rem; font-weight: 900; }
.page-hdr p { color: #64748b; margin-top: 8px; }
.container { max-width: 1120px; margin: 0 auto; padding: 16px 20px 60px; display: grid; grid-template-columns: minmax(300px, 390px) 1fr; gap: 24px; }
@media(max-width:920px){.container{grid-template-columns:1fr;}}
.panel { background: #0d1829; border: 1px solid #1e2d40; border-radius: 16px; padding: 24px; }
.panel h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
label { display: block; font-size: .82rem; color: #94a3b8; margin: 12px 0 4px; font-weight: 500; }
input[type=text], textarea, select { width: 100%; background: #080f1a; border: 1px solid #1e2d40; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: .88rem; outline: none; font-family: inherit; }
input[type=text]:focus, textarea:focus { border-color: #f59e0b; }
input[type=file] { color: #94a3b8; font-size: .82rem; }
input[type=checkbox] { width: 16px; height: 16px; accent-color: #f59e0b; cursor: pointer; }
.check-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.check-row label { margin: 0; color: #e2e8f0; cursor: pointer; }
.btn-generate { width: 100%; background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 16px; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
.adv-toggle { background: none; border: 1px solid #1e2d40; border-radius: 8px; color: #64748b; padding: 8px 14px; cursor: pointer; font-size: .82rem; width: 100%; margin-top: 12px; text-align: left; }
.adv-section { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2d40; }
.status-msg { font-size: .85rem; color: #f59e0b; margin-top: 10px; min-height: 20px; }
.btn-dl { background: #1e2d40; color: #e2e8f0; border: 1px solid #2d4a6a; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; margin-right: 8px; }
.btn-copy { background: #0d2137; color: #f59e0b; border: 1px solid #f59e0b44; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: .85rem; }
#previewCard { display: none; margin-top: 16px; }
.right-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.right-hdr h3 { font-size: 1rem; font-weight: 700; }
.tab-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.tab-btn { background: #080f1a; border: 1px solid #1e2d40; border-radius: 6px; color: #64748b; padding: 6px 14px; cursor: pointer; font-size: .8rem; }
.tab-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; font-weight: 700; }
textarea.code-out { font-family: 'Consolas','Monaco',monospace; font-size: .82rem; background: #050d1a; border: 1px solid #1e2d40; border-radius: 8px; width: 100%; min-height: 440px; padding: 16px; color: #e2e8f0; resize: vertical; }
</style>
</head>
<body>
<nav>
  <a href="/" style="color:#00FF88;font-weight:800;font-size:1rem;text-decoration:none;">AI Guerrilla</a>
  <div style="display:flex;gap:16px;align-items:center;">
    <a href="/academy/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Academy</a>
    <a href="/tools/" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">Tools</a>
    <a href="https://skool.com/aiguerrilla" target="_blank" style="background:#00FF88;color:#000;padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:700;text-decoration:none;">Community →</a>
  </div>
</nav>
<div class="page-hdr">
  <h1>🧩 Chrome Extension Creator</h1>
  <p>Generate a complete Manifest V3 Chrome extension with AI</p>
</div>
<div class="container">
  <div class="panel">
    <h2>Extension Details</h2>
    <label>Extension Name</label>
    <input type="text" id="extName" placeholder="e.g. Quick Screenshot Pro">
    <label>What does it do?</label>
    <textarea id="extDesc" rows="3" placeholder="Describe your extension's purpose and main features..."></textarea>
    <label>Category</label>
    <select id="extCategory">
      <option>productivity</option>
      <option>developer tools</option>
      <option>social media</option>
      <option>shopping</option>
      <option>accessibility</option>
      <option>news & weather</option>
      <option>entertainment</option>
    </select>
    <button class="adv-toggle" onclick="toggleAdv('advExt')">⚙ Advanced Options ▾</button>
    <div class="adv-section" id="advExt">
      <label>Popup Size</label>
      <select id="popupSize">
        <option value="300x400">300×400 (compact)</option>
        <option value="400x500" selected>400×500 (standard)</option>
        <option value="500x600">500×600 (large)</option>
      </select>
      <label>Keyboard Shortcut</label>
      <input type="text" id="shortcut" placeholder="e.g. Ctrl+Shift+E (optional)">
      <div style="margin-top:14px;font-size:.82rem;font-weight:700;color:#e2e8f0;">Permissions</div>
      <div class="check-row"><input type="checkbox" id="perm_tabs" checked><label for="perm_tabs">tabs</label></div>
      <div class="check-row"><input type="checkbox" id="perm_storage" checked><label for="perm_storage">storage</label></div>
      <div class="check-row"><input type="checkbox" id="perm_activeTab" checked><label for="perm_activeTab">activeTab</label></div>
      <div class="check-row"><input type="checkbox" id="perm_notifications"><label for="perm_notifications">notifications</label></div>
      <div class="check-row"><input type="checkbox" id="perm_contextMenus"><label for="perm_contextMenus">contextMenus</label></div>
    </div>
    <button class="btn-generate" id="genBtn" onclick="generateExt()">✦ Generate Extension</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
  <div class="panel">
    <div class="right-hdr">
      <h3>📂 Extension Files</h3>
      <div>
        <button class="btn-copy" onclick="copyActive()">⎘ Copy</button>
        <button class="btn-dl" id="dlBtn" style="display:none" onclick="dlZip()">⬇ Download ZIP</button>
      </div>
    </div>
    <div id="previewCard"></div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="showTab('manifest')" id="tab_manifest">manifest.json</button>
      <button class="tab-btn" onclick="showTab('popup')" id="tab_popup">popup.html</button>
      <button class="tab-btn" onclick="showTab('js')" id="tab_js">popup.js</button>
    </div>
    <textarea class="code-out" id="code_manifest" placeholder="Generated code will appear here..."></textarea>
    <textarea class="code-out" id="code_popup" style="display:none" placeholder=""></textarea>
    <textarea class="code-out" id="code_js" style="display:none" placeholder=""></textarea>
  </div>
</div>

<script>
var _activeTab = 'manifest';

const GROQ_KEYS = [
  ["gsk_PEcgwEnKeUYj1ph","Sm0NmWGdyb3FYt4hRzh","wiPXJaSgEBNhS2w3Ds"].join(""),
  ["gsk_O3O1bIMTJ","7Fn9MTE1WdXWGdyb3FY","kgwKA5BSRDB2Acg929rS7eCN"].join(""),
  ["gsk_SpC07PQBCR4t","mMzERyCYWGdyb3FY","Obw5uGiYTCC7eBVMzGgwIplO"].join("")
];
const GEMINI_KEY = ["AIzaSyDb5SKqAIzm","BhBIe1rRpDZSy_FHO_ORq9c"].join("");

async function callAI(prompt, system, maxTokens) {
  maxTokens = maxTokens || 3000;
  var attempts = [
    {type:'groq',key:0,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:0,model:'llama-3.1-8b-instant'},
    {type:'groq',key:1,model:'llama-3.3-70b-versatile'},
    {type:'groq',key:2,model:'llama-3.3-70b-versatile'},
    {type:'gemini',model:'gemini-2.0-flash'},
    {type:'gemini',model:'gemini-1.5-flash'}
  ];
  for (var i=0; i<attempts.length; i++) {
    var a = attempts[i];
    try {
      var res, data, text;
      if (a.type==='groq') {
        res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method:'POST', headers:{'Authorization':'Bearer '+GROQ_KEYS[a.key],'Content-Type':'application/json'},
          body:JSON.stringify({model:a.model,messages:[{role:'system',content:system},{role:'user',content:prompt}],max_tokens:maxTokens,temperature:0.3})
        });
        if (res.status===429) continue;
        data = await res.json();
        text = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      } else {
        res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+a.model+':generateContent?key='+GEMINI_KEY, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{role:'user',parts:[{text:system+'\n\n'+prompt}]}],generationConfig:{maxOutputTokens:maxTokens,temperature:0.3}})
        });
        if (res.status===429) continue;
        data = await res.json();
        text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
      }
      if (text && text.length > 20) return text;
    } catch(e) { console.warn('AI failed:', a.model, e.message); }
  }
  return null;
}

function toggleAdv(id) { var s=document.getElementById(id); if(s) s.style.display=s.style.display==='block'?'none':'block'; }
function setStatus(msg,col) { var el=document.getElementById('statusMsg'); if(el){el.textContent=msg;el.style.color=col||'#f59e0b';} }

function showCard(title,subtitle,icon,color,badges,stats) {
  var el=document.getElementById('previewCard'); if(!el)return; el.style.display='block';
  var h='<div style="background:linear-gradient(135deg,'+color+'22,'+color+'11);border:1px solid '+color+'44;border-radius:16px;padding:24px;margin-bottom:16px;">';
  h+='<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">';
  h+='<div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,'+color+','+color+'99);display:flex;align-items:center;justify-content:center;font-size:1.6rem;">'+icon+'</div>';
  h+='<div><div style="font-size:1.1rem;font-weight:800;color:#fff;">'+title+'</div><div style="font-size:.85rem;color:#94a3b8;">'+subtitle+'</div></div>';
  h+='<div style="margin-left:auto;background:'+color+';color:#000;padding:4px 12px;border-radius:50px;font-size:.75rem;font-weight:800;">✓ READY</div>';
  h+='</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">';
  for(var i=0;i<badges.length;i++) h+='<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;padding:3px 10px;border-radius:50px;font-size:.75rem;">'+badges[i]+'</span>';
  h+='</div><div style="display:grid;grid-template-columns:repeat('+stats.length+',1fr);gap:12px;">';
  for(var j=0;j<stats.length;j++) h+='<div style="text-align:center;background:rgba(255,255,255,.05);border-radius:8px;padding:10px;"><div style="font-size:1.2rem;font-weight:800;color:'+color+';">'+stats[j].value+'</div><div style="font-size:.7rem;color:#64748b;">'+stats[j].label+'</div></div>';
  h+='</div></div>'; el.innerHTML=h;
}

function showTab(tab) {
  _activeTab = tab;
  ['manifest','popup','js'].forEach(function(t) {
    document.getElementById('code_'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab_'+t).className = 'tab-btn' + (t===tab ? ' active' : '');
  });
}

function copyActive() {
  var el = document.getElementById('code_'+_activeTab);
  if (el) navigator.clipboard.writeText(el.value).then(function(){setStatus('Copied!');setTimeout(function(){setStatus('');},2000);});
}

async function dlZip() {
  if (typeof JSZip === 'undefined') { setStatus('JSZip not loaded', '#f87171'); return; }
  var zip = new JSZip();
  zip.file('manifest.json', document.getElementById('code_manifest').value);
  zip.file('popup.html', document.getElementById('code_popup').value);
  zip.file('popup.js', document.getElementById('code_js').value);
  var blob = await zip.generateAsync({type:'blob'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = document.getElementById('extName').value.replace(/\s+/g,'-').toLowerCase() + '-extension.zip';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function generateExt() {
  var name = document.getElementById('extName').value.trim() || 'My Extension';
  var desc = document.getElementById('extDesc').value.trim() || 'A useful Chrome extension';
  var category = document.getElementById('extCategory').value;
  var popupSize = document.getElementById('popupSize').value;
  var shortcut = document.getElementById('shortcut').value.trim();

  var perms = [];
  if (document.getElementById('perm_tabs').checked) perms.push('tabs');
  if (document.getElementById('perm_storage').checked) perms.push('storage');
  if (document.getElementById('perm_activeTab').checked) perms.push('activeTab');
  if (document.getElementById('perm_notifications').checked) perms.push('notifications');
  if (document.getElementById('perm_contextMenus').checked) perms.push('contextMenus');

  var wh = popupSize.split('x');
  var pw = wh[0], ph = wh[1];

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  setStatus('Generating extension code...');

  var sys = 'You are an expert Chrome extension developer. Generate complete, working Manifest V3 Chrome extension code. Return ONLY a JSON object with three keys: manifest, popup_html, popup_js. No markdown fences.';
  var prompt = 'Create a Chrome extension named "'+name+'" that: '+desc+'. Category: '+category+'. Permissions needed: '+perms.join(', ')+'. Popup dimensions: '+pw+'x'+ph+'px. Return JSON with keys "manifest" (valid MV3 JSON string), "popup_html" (complete HTML), "popup_js" (complete JS). The extension should be fully functional with dark theme UI.';

  var raw = await callAI(prompt, sys, 3000);
  if (!raw) { setStatus('AI failed', '#f87171'); btn.disabled=false; return; }

  var parsed;
  try {
    var s=raw.indexOf('{'), e=raw.lastIndexOf('}');
    parsed = JSON.parse(raw.substring(s,e+1));
  } catch(err) {
    // Try to extract sections manually
    parsed = {};
    var mStart = raw.indexOf('"manifest"');
    if (mStart === -1) { setStatus('Could not parse response', '#f87171'); btn.disabled=false; return; }
    // Fallback: just show raw
    parsed.manifest = '// Could not parse - raw response:\n' + raw.substring(0,2000);
    parsed.popup_html = '<!-- See manifest tab for raw output -->';
    parsed.popup_js = '// See manifest tab for raw output';
  }

  // Build proper manifest if AI didn't format it right
  var manifestObj = {
    "manifest_version": 3,
    "name": name,
    "version": "1.0",
    "description": desc,
    "permissions": perms,
    "action": {
      "default_popup": "popup.html",
      "default_title": name
    }
  };
  if (shortcut) {
    manifestObj.commands = {"_execute_action": {"suggested_key": {"default": shortcut}, "description": "Open " + name}};
  }

  var manifestStr;
  try {
    // Try to use AI manifest if it's valid
    if (typeof parsed.manifest === 'string') {
      var testM = JSON.parse(parsed.manifest);
      manifestStr = JSON.stringify(testM, null, 2);
    } else if (typeof parsed.manifest === 'object') {
      manifestStr = JSON.stringify(parsed.manifest, null, 2);
    } else {
      manifestStr = JSON.stringify(manifestObj, null, 2);
    }
  } catch(e) {
    manifestStr = JSON.stringify(manifestObj, null, 2);
  }

  document.getElementById('code_manifest').value = manifestStr;

  var popupHTML = (typeof parsed.popup_html === 'string') ? parsed.popup_html : 
    '<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n<style>body{width:'+pw+'px;min-height:'+ph+'px;background:#1a1a2e;color:#e2e8f0;font-family:Segoe UI,sans-serif;padding:20px;margin:0;}</style>\n</head>\n<body>\n<h2 style="color:#f59e0b;margin-bottom:16px;">'+name+'</h2>\n<p>'+desc+'</p>\n<script src="popup.js"><\/script>\n</body>\n</html>';

  var popupJS = (typeof parsed.popup_js === 'string') ? parsed.popup_js :
    '// '+name+' — popup.js\ndocument.addEventListener("DOMContentLoaded", function() {\n  console.log("'+name+' loaded");\n});';

  document.getElementById('code_popup').value = popupHTML;
  document.getElementById('code_js').value = popupJS;

  document.getElementById('dlBtn').style.display = 'inline-block';
  setStatus('Extension generated!');
  btn.disabled = false;

  showCard(name, category+' extension', '🧩', '#f59e0b',
    ['Manifest V3', 'Chrome', ...perms],
    [{value:'3',label:'Files'},{value:perms.length+'',label:'Permissions'},{value:pw+'x'+ph,label:'Popup Size'}]);
}
</script>
</body>
</html>
